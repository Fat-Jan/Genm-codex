version: "1.0"
strategy: "fanqie-first-tagpacks"

tagpacks:
  evil_female_gongdou:
    name: "恶女 x 宫斗宅斗"
    priority_rank: 1
    base_bucket: "宫斗宅斗"
    positioning: "强压制、强反咬、强权力抬升的女频长篇爽感线"
    protagonist_core:
      - "表面守规矩，内里极能忍也极能算"
      - "不是单纯黑化，而是目标明确、反击精准"
      - "反击手段必须合礼法、合权力结构"
    reader_motive:
      - "看她在高压秩序里反咬翻盘"
      - "看她把嫡庶、婚书、后宅权力一层层夺回来"
    title_cues:
      - "身份反差"
      - "压制关系"
      - "一夜翻盘"
      - "婚书/赐婚/活埋/下跪"
    synopsis_cues:
      - "先抛被害与压制"
      - "再抛主角手里的后手"
      - "最后挂更大的府门局或东宫局"
    opening_rule: "第一屏必须见压制与不公，且主角要很快显出不是任人宰割的底子。"
    payoff_rule: "第一章内必须有一次反咬或逼停压制，不能只挨打。"
    resistance_expectation: "反咬必须撞上真实阻力，不能因为主角开口就所有人自动失手。"
    cost_expectation: "每次翻盘都要带树敌、暴露、规矩反噬或更大权力入场的代价。"
    ending_hook_rule: "章末必须把宅斗局接到更大权力局。"
    avoid:
      - "无脑泼辣式反击"
      - "纯靠天降权力翻盘"
      - "把恶女写成降智狠毒工具人"

  evil_female_qinggan:
    name: "恶女 x 现实情感"
    priority_rank: 2
    base_bucket: "现实情感"
    positioning: "高痛点、高情绪、高切割意志的现实女频付费线"
    protagonist_core:
      - "利己但不悬浮"
      - "不圣母，不无限原谅"
      - "反击必须靠现实证据、规则和执行力"
    reader_motive:
      - "看她不再忍让"
      - "看她把关系和利益一笔笔算清"
    title_cues:
      - "人物关系"
      - "核心伤害"
      - "断裂/反击结果"
      - "离婚/出轨/婆家/热搜/净身出户"
    synopsis_cues:
      - "先抛最痛伤害"
      - "再抛被逼到什么程度"
      - "亮出她的现实反击"
      - "挂更大的关系反噬或利益爆点"
    opening_rule: "前100到200字必须给出伤害现场，且主角要显出不再当受气包。"
    payoff_rule: "前两章内必须给第一次有效切割或证据反击。"
    resistance_expectation: "现实反击必须遇到家人、前任、利益链或舆论的反制。"
    cost_expectation: "切割成功要伴随关系撕裂、现实代价或更大反噬。"
    ending_hook_rule: "结尾要让读者明确看到更大的账还没算完。"
    avoid:
      - "写成只会骂人或哭的受害者"
      - "反击只靠巧合"
      - "情绪很狠但现实逻辑站不住"

  evil_female_tianchong:
    name: "恶女 x 现言甜宠"
    priority_rank: 3
    base_bucket: "现言甜宠"
    positioning: "高反差、高糖感下的危险女主路线"
    protagonist_core:
      - "嘴硬心黑一点"
      - "擅长利用误会和场面"
      - "不是无底线黑化，而是高边界感和高掌控欲"
    reader_motive:
      - "看关系绑死后的高反差甜点"
      - "看她把旧前任和外部压力玩回去"
    title_cues:
      - "闪婚/先婚后爱"
      - "误认身份"
      - "豪门反差"
      - "她先下手"
    synopsis_cues:
      - "先给关系意外"
      - "再给身份反差"
      - "再给女主主动掌控局面"
      - "最后挂关系升级或翻车风险"
    opening_rule: "开场就进关系局，女主不能太被动，得显出她敢赌。"
    payoff_rule: "第一章必须见到关系绑定和第一层身份反差。"
    resistance_expectation: "关系局可以快开，但关系确认、站边和甜点都不能无阻力直给。"
    cost_expectation: "每次关系收益都要留下误会、身份压力或更危险的绑定后果。"
    ending_hook_rule: "结尾必须让关系更危险、更甜或更失控。"
    avoid:
      - "把恶女写成单纯作精"
      - "甜宠变成无脑虐"
      - "男主或女主降智只为制造误会"

  evil_female_dual_substitute:
    name: "恶毒女配 x 双女主替身白月光"
    priority_rank: 4
    base_bucket: "现言甜宠"
    positioning: "双核心女性关系驱动下的替身/白月光/女配反转付费候选线"
    protagonist_core:
      - "不是单纯恶毒，而是知道自己在关系局里怎么抢回主位"
      - "不能卑微吃替身亏，必须有清晰边界和主动选择"
      - "要像女配反转，不像标签堆砌"
    reader_motive:
      - "看她不再做白月光的替身"
      - "看双核心女性关系如何翻面"
      - "看她把本该属于原女主或白月光的位置抢回来"
    title_cues:
      - "恶毒女配"
      - "替身/白月光"
      - "她不演了"
      - "双关系位翻面"
    synopsis_cues:
      - "先抛她被放在什么错误位置上"
      - "再抛她为什么不再演"
      - "再抛双核心女性关系如何反咬"
      - "最后挂更大的关系失控或身份反转"
    opening_rule: "开头100到200字就要让读者看见替身位、白月光位或女配位中的至少一层错位。"
    payoff_rule: "前两章内必须出现一次‘她不再当替身/不再按原剧本走’的有效动作。"
    resistance_expectation: "双女主翻面不能一拍即合，必须经过试探、卡牌、交换或短暂错位。"
    cost_expectation: "每次关系反转和证据反打都要有代价，不能把替身线写成资料自动掉落。"
    trust_curve: "站边快于信任，合作快于同频，公开联手快于真正同盟。"
    ending_hook_rule: "结尾必须把关系局推向更危险的双女主张力，而不是只停在男主后悔。"
    avoid:
      - "把双女主写成单纯雌竞口水战"
      - "把恶毒女配写成标签化脸谱"
      - "替身线只剩男主追妻"
      - "没有正文样本前就把它吹成已验证付费主线"
