# 现实题材 Profile v3.0
# 网文创作系统 - 目录化配置

name: "现实题材"
display_name: "现实题材"
description: "现实生活、都市奋斗、乡村故事题材"
version: "3.0"
template: templates/genres/现实题材.md

# ==================== 推进阻力与代价 ====================
progression_constraints:
  resistance_rule: "关键推进必须遭遇真实阻力，不能自动到账。"
  cost_rule: "重要收益应伴随可见代价、暴露或资源损耗。"
  partial_payoff_rule: "阶段胜利以局部收益为主，不宜一次打穿主线矛盾。"
  residual_risk_rule: "每次推进后都应保留残留风险，避免章节收口过满。"


# ==================== 流派细分定义 ====================
sub_genres:
  urban_struggle:
    name: "都市奋斗流"
    description: "现代都市奋斗故事"
    core_points: [努力成功, 人生逆袭, 现实感强]
    pacing: struggle

  rural:
    name: "乡村题材流"
    description: "农村生活故事"
    core_points: [乡村振兴, 发家致富, 温馨治愈]
    pacing: warm

  industry:
    name: "行业题材流"
    description: "特定行业故事"
    core_points: [专业感, 行业成功, 职业成长]
    pacing: professional

# ==================== 节奏参数 ====================
pacing:
  type: 现实奋斗型
  tension_ratio: "5:5"
  typical_chapter_length: 4500
  word_count:
    minimum: 4000
    standard: 4000-5500
    long: 5500-7000

# ==================== 爽点配置 ====================
cool_points:
  density: 0.7
  max_interval: 1800

  preferred_types:
    - type: 努力成功
      weight: 1.5
      description: "通过努力获得回报"
      triggers: [成功, 成绩, 认可, 晋升, 加薪, 表彰]

    - type: 人生逆袭
      weight: 1.4
      description: "从低谷走向成功"
      triggers: [逆袭, 翻身, 改变, 重来, 崛起, 翻盘]

    - type: 温馨治愈
      weight: 1.3
      description: "温暖治愈的情感体验"
      triggers: [温暖, 感动, 治愈, 幸福, 美好, 希望]

    - type: 专业成长
      weight: 1.2
      description: "职业能力提升"
      triggers: [专业, 能力, 成长, 进步, 独当一面]

  combo_bonus:
    consecutive: 0.2
    setup_explosion: 0.3
    contrast: 0.2
    stacking: 0.1

# ==================== Strand 权重 ====================
strand_weights:
  quest: 40
  fire: 25
  constellation: 35

# ==================== 特殊约束 ====================
constraints:
  - id: REAL-001
    description: "现实感要强"
    mandatory: true
    checkpoint: 整体氛围

  - id: REAL-002
    description: "不能太悬浮"
    mandatory: true
    checkpoint: 情节设计

# ==================== 读者期待 ====================
reader_expectations:
  must_satisfy:
    - "现实感要强"
    - "情节不能太悬浮"
    - "人物行为要真实合理"

  optional_satisfy:
    - "奋斗成功的励志感"
    - "温馨治愈的情感"
    - "行业专业的描写"

  never_violate:
    - "过于浮夸的情节"
    - "不符合人物身份的语言"
    - "矫情做作的表达方式"

# ==================== 平台定位 ====================
platform_positioning:
  fanqie:
    primary_bucket: "现实情感"
    strong_tags: ["现实困局", "成长"]
    narrative_modes: ["多角色群像"]
    tone_guardrails: ["现实代价不能消失", "治愈不等于无后果"]
    package_cues:
      - "首行点困局"
      - "300字内点主线"

# ==================== 禁忌清单 ====================
taboos:
  - id: TABOO-001
    content: "情节过于悬浮脱离现实"
    severity: critical
    checkpoint: "情节设计"

  - id: TABOO-002
    content: "不符合人物身份的语言"
    severity: warning
    checkpoint: "人物对话"

  - id: TABOO-003
    content: "矫情做作的表达方式"
    severity: warning
    checkpoint: "整体风格"

  - id: TABOO-004
    content: "人物行为不真实不合理"
    severity: warning
    checkpoint: "人物行为"

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 0.8
  consistency: 1.2
  pacing: 1.0
  ooc: 1.1
  continuity: 1.0
  reader-pull: 1.0

# ==================== 参考扩展文件 ====================
reference_files:
  - reference-notes.md
