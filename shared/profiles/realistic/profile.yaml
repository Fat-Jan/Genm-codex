# 现实题材 Profile v3.0
# 网文创作系统 - 目录化配置

name: "现实题材"
display_name: "现实题材"
description: "现实生活、都市奋斗、乡村故事题材"
version: "3.0"
template: templates/genres/现实题材.md

# ==================== 推进阻力与代价 ====================
progression_constraints:
  resistance_rule: "关键推进必须遭遇真实阻力，不能自动到账。"
  cost_rule: "重要收益应伴随可见代价、暴露或资源损耗。"
  partial_payoff_rule: "阶段胜利以局部收益为主，不宜一次打穿主线矛盾。"
  residual_risk_rule: "每次推进后都应保留残留风险，避免章节收口过满。"


# ==================== 流派细分定义 ====================
sub_genres:
  urban_struggle:
    name: "都市奋斗流"
    description: "现代都市奋斗故事"
    core_points: [努力成功, 人生逆袭, 现实感强]
    pacing: struggle

  rural:
    name: "乡村题材流"
    description: "农村生活故事"
    core_points: [乡村振兴, 发家致富, 温馨治愈]
    pacing: warm

  industry:
    name: "行业题材流"
    description: "特定行业故事"
    core_points: [专业感, 行业成功, 职业成长]
    pacing: professional

# ==================== 节奏参数 ====================
pacing:
  type: 现实奋斗型
  tension_ratio: "5:5"
  typical_chapter_length: 4500
  word_count:
    minimum: 4000
    standard: 4000-5500
    long: 5500-7000

# ==================== 爽点配置 ====================
cool_points:
  density: 0.7
  max_interval: 1800

  preferred_types:
    - type: 努力成功
      weight: 1.5
      description: "通过努力获得回报"
      triggers: [成功, 成绩, 认可, 晋升, 加薪, 表彰]

    - type: 人生逆袭
      weight: 1.4
      description: "从低谷走向成功"
      triggers: [逆袭, 翻身, 改变, 重来, 崛起, 翻盘]

    - type: 温馨治愈
      weight: 1.3
      description: "温暖治愈的情感体验"
      triggers: [温暖, 感动, 治愈, 幸福, 美好, 希望]

    - type: 专业成长
      weight: 1.2
      description: "职业能力提升"
      triggers: [专业, 能力, 成长, 进步, 独当一面]

  combo_bonus:
    consecutive: 0.2
    setup_explosion: 0.3
    contrast: 0.2
    stacking: 0.1

# ==================== Strand 权重 ====================
strand_weights:
  quest: 40
  fire: 25
  constellation: 35

# ==================== 特殊约束 ====================
constraints:
  - id: REAL-001
    description: "现实感要强"
    mandatory: true
    checkpoint: 整体氛围

  - id: REAL-002
    description: "不能太悬浮"
    mandatory: true
    checkpoint: 情节设计

# ==================== 读者期待 ====================
reader_expectations:
  must_satisfy:
    - "现实感要强"
    - "情节不能太悬浮"
    - "人物行为要真实合理"

  optional_satisfy:
    - "奋斗成功的励志感"
    - "温馨治愈的情感"
    - "行业专业的描写"

  never_violate:
    - "过于浮夸的情节"
    - "不符合人物身份的语言"
    - "矫情做作的表达方式"

# ==================== 禁忌清单 ====================
taboos:
  - id: TABOO-001
    content: "情节过于悬浮脱离现实"
    severity: critical
    checkpoint: "情节设计"

  - id: TABOO-002
    content: "不符合人物身份的语言"
    severity: warning
    checkpoint: "人物对话"

  - id: TABOO-003
    content: "矫情做作的表达方式"
    severity: warning
    checkpoint: "整体风格"

  - id: TABOO-004
    content: "人物行为不真实不合理"
    severity: warning
    checkpoint: "人物行为"

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 0.8
  consistency: 1.2
  pacing: 1.0
  ooc: 1.1
  continuity: 1.0
  reader-pull: 1.0

# ==================== 对话模板库 ====================
dialogue_templates:
  styles:
    realistic: 接地气，真实自然，贴近生活

  typical_dialogues:
    workplace: |
      "小李，这个项目你负责，下周交方案。"
      "好的，王总。不过有些细节我还需要确认一下。"
      "行，有问题随时沟通。这次对你来说是个机会，好好把握。"
      "谢谢王总，我一定尽力。"

    family: |
      "妈，我回来了。"
      "回来了？饭在锅里，趁热吃。今天工作怎么样？"
      "还行，就是有点累。"
      "累就早点休息，别总熬夜。"

    rural_neighbor: |
      "李嫂，你家的菜长得真好啊！"
      "哪里哪里，今年的雨水好，都沾了老天爷的光。"
      "改天你也教教我，我那几分地，总是种不好。"
      "嗨，这有啥教的，多浇水，勤除草，庄稼自然长得好。"

  avoid_patterns:
    - 过于浮夸的对话内容
    - 不符合人物身份的语言
    - 矫情做作的表达方式

# ==================== 场景描写库 ====================
scene_descriptions:
  urban_scene:
    office: |
      "电梯门打开，又是一个忙碌的早晨。白领们捧着咖啡，行色匆匆地走向各自的工位。键盘敲击声此起彼伏，电话铃声不时响起。窗外，城市的轮廓在晨光中渐渐清晰，又一天开始了。"

    subway: |
      "早高峰的地铁里，人挤着人。年轻人低头刷着手机，脸上写满疲惫。车厢里弥漫着各种气味：早饭的包子味、汗味、香水味混杂在一起。广播里循环播放着'请注意保管好您的随身物品'，却没人真的在意。"

  rural_scene:
    morning: |
      "公鸡的打鸣声划破了黎明的寂静。炊烟从各家各户的烟囱里袅袅升起，空气中弥漫着柴火燃烧的味道。田间地头，已经有勤劳的农民开始了一天的劳作。远处的山峦在薄雾中若隐若现，一切都是那么安详。"

    market: |
      "小镇的集市上，叫卖声此起彼伏。农民们把自家种的蔬菜瓜果摆在地上，脸上带着朴实的笑容。讨价还价声、鸡鸣狗叫声、孩子的嬉闹声交织在一起，构成了最生动的乡村交响曲。"

# ==================== 节奏模板 ====================
pacing_templates:
  single_chapter_curve:
    struggle: "现状25% → 挑战25% → 努力25% → 收获25%"
    warm: "日常50% → 小事件25% → 感动25%"

  typical_examples:
    workplace_chapter: "工作任务 → 遇到困难 → 努力克服 → 取得成绩"
    life_chapter: "日常琐事 → 人际互动 → 问题解决 → 温馨收尾"

# ==================== 开篇模板 ====================
opening_templates:
  hook_types:
    life_dilemma: 主角面临人生重大困境或选择
    return_home: 城市打拼后回乡发展
    entering_industry: 进入某个行业开始奋斗

  classic_examples:
    urban_struggle_style: |
      "凌晨三点，李明走出写字楼，抬头看了看灰蒙蒙的天空。又是一个加班到深夜的日子。手机里躺着房东催房租的短信，银行卡余额已经不够交这个月的房租了。三十岁的他，在大城市打拼了七年，却依然一无所有。他叹了口气，不知道这样的日子还要持续多久。"

    rural_entrepreneurship_style: |
      "大巴车在蜿蜒的山路上颠簸前行。窗外，熟悉的风景一幕幕掠过。十年了，他终于又回到了这个小山村。当年离开时，他信誓旦旦地说要在外面闯出一片天地。如今回来，却是两手空空。不过，这一次，他下定决心，要在这片土地上重新开始。"