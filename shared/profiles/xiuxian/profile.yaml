# 修仙题材 Profile v3.0
# 网文创作系统 - 目录化配置

name: "修仙"
display_name: "修仙"
description: "传统修仙、玄幻类力量成长题材"
version: "3.0"
template: templates/genres/修仙.md

# ==================== 推进阻力与代价 ====================
progression_constraints:
  resistance_rule: "关键推进必须遭遇真实阻力，不能自动到账。"
  cost_rule: "重要收益应伴随可见代价、暴露或资源损耗。"
  partial_payoff_rule: "阶段胜利以局部收益为主，不宜一次打穿主线矛盾。"
  residual_risk_rule: "每次推进后都应保留残留风险，避免章节收口过满。"


# ==================== 流派细分定义 ====================
sub_genres:
  traditional:
    name: "传统修仙"
    description: "经典修仙路线，循序渐进"
    core_points: [境界突破, 越级挑战, 机缘获得]
    pacing: slow
    examples: [凡人修仙传, 仙逆]

  invincible:
    name: "无敌流修仙"
    description: "主角开局强大或快速成长"
    core_points: [碾压对手, 震惊众人, 收徒装逼]
    pacing: fast
    examples: [我师兄实在太稳健了]

  cautious:
    name: "苟道修仙"
    description: "主角极度谨慎，稳扎稳打"
    core_points: [幕后布局, 扮猪吃虎, 安全通关]
    pacing: strategic
    examples: [稳健修仙]

  underdog:
    name: "废材逆袭"
    description: "起点低，通过金手指逆袭"
    core_points: [逆袭打脸, 天才震惊, 地位跃升]
    pacing: shuangwen
    examples: [斗破苍穹]

# ==================== 节奏参数 ====================
pacing:
  type: 慢热
  tension_ratio: "3:7"
  typical_chapter_length: 5000
  word_count:
    minimum: 4000
    standard: 4000-6000
    long: 6000-8000

# ==================== 爽点配置 ====================
# 爽点评分系统 v2.0 - 加权智能计算
#
# 基础公式: 加权爽点密度 = Σ(爽点权重) / (字数/1000)
#
# 权重配置说明:
#   - 权重范围: 0.0-2.0，推荐范围 0.8-1.5
#   - 默认权重: 打脸爽(1.4), 越级爽(1.4), 机缘爽(1.2), 逆袭爽(1.2),
#               升级爽(1.1), 情感爽(1.1), 收获爽(1.0), 装逼爽(1.0), 扮猪吃虎(1.3)
#   - 组合加成: 连续爽点(+0.2), 铺垫后爆发(+0.3), 对比反差(+0.2), 多重叠加(+0.1/层)
#
# 平台标准(2026):
#   七猫: 1.3-1.8/千字  番茄: 1.2-1.5/千字  起点: 0.8-1.0/千字  晋江: 1.0/千字
#
cool_points:
  density: 0.8  # 每千字，修仙节奏较慢
  max_interval: 1500  # 最大间隔字数，超过此值需预警

  # 偏好类型及权重
  preferred_types:
    - type: 越级反杀
      weight: 1.5
      description: "低境界击败高境界，展示主角特殊手段"
      triggers: [越级, 反杀, 不可能, 不可思议, 碾压, 蝼蚁]

    - type: 机缘获得
      weight: 1.4
      description: "获得传承、宝物、功法"
      triggers: [传承, 宝物, 机缘, 造化, 觉醒, 获得]

    - type: 境界突破
      weight: 1.3
      description: "突破境界，实力飞跃"
      triggers: [突破, 境界, 筑基, 金丹, 元婴]

    - type: 打脸爽
      weight: 1.2
      description: "被轻视后展现实力"
      triggers: [轻视, 嘲讽, 看不起, 废物, 震惊, 脸色大变]

    - type: 逆袭爽
      weight: 1.1
      description: "从劣势到优势的逆转"
      triggers: [逆转, 翻盘, 反败为胜, 扭转, 绝地]

  # 避免类型
  avoid_types:
    - type: 无铺垫打脸
      weight: 0
      reason: 需要先建立信息差

    - type: 无代价越级
      weight: 0.3
      reason: 越级必须有代价或特殊手段

  # 组合加成
  combo_bonus:
    consecutive: 0.2       # 警告: 可能导致阈值过高，谨慎使用
    setup_explosion: 0.3   # 铺垫 > 500 字后爆发爽点
    contrast: 0.2          # 前后状态形成强烈对比
    stacking: 0.1          # 每层加成，上限+0.3

# ==================== Strand 权重 ====================
strand_weights:
  quest: 55        # 任务推进为主
  fire: 25         # 冲突爆发
  constellation: 20  # 世界观铺垫

  warnings:
    quest_max_consecutive: 5
    fire_missing_max: 10
    constellation_missing_max: 15

# ==================== 特殊约束 ====================
constraints:
  - id: POWER-001
    description: "大境界压制不可逾越（除非有特殊手段）"
    mandatory: true
    checkpoint: 战斗场景

  - id: POWER-002
    description: "突破必须有铺垫和积累"
    mandatory: true
    checkpoint: 突破场景

  - id: RESOURCE-001
    description: "资源获取需符合世界观逻辑"
    mandatory: false
    checkpoint: 获得资源时

  - id: TIME-001
    description: "修炼时间需合理"
    mandatory: true
    checkpoint: 时间描述

# ==================== 黄金三章 ====================
golden_three:
  chapter_1:
    opening: 危机/被欺负
    core: 展示修仙界残酷
    hint: 金手指/机缘即将出现
    hook: 机缘现世征兆
    word_count: 4000-5000

  chapter_2:
    expansion: 金手指首次展现
    conflict: 资源争夺或小人陷害
    upgrade: 获得初步修炼资源
    hook: 即将到来的危机
    word_count: 4000-6000

  chapter_3:
    climax: 第一次小打脸或突破
    worldbuilding: 展示更大的修仙世界
    hook: 新的危机或机缘预告
    word_count: 4000-6000

# ==================== 反套路规则 ====================
anti_trope:
  auto_load:
    - references/creativity/anti-trope-xianxia.md
  recommended_rules:
    - XH-001  # 金手指使用消耗寿命
    - XH-006  # 主角无法正常修炼
    - XH-009  # 修炼资源极度稀缺
    - XH-012  # 越级战斗必有代价

# ==================== 读者期待 ====================
reader_expectations:
  must_satisfy:
    - "主角成长要有逻辑，不能无脑升级"
    - "世界观设定要严谨，前后一致"
    - "境界压制要合理，越级要有特殊手段"
    - "战斗要精彩，有招式描写"

  optional_satisfy:
    - "有感情线但不喧宾夺主"
    - "有机缘奇遇"
    - "有搞笑配角调剂"

  never_violate:
    - "主角无脑升级，没有积累"
    - "世界观前后矛盾"
    - "境界压制随意打破，无理由越级"
    - "金手指一开始就全开，无成长性"

# ==================== 平台定位 ====================
platform_positioning:
  fanqie:
    primary_bucket: "传统玄幻"
    strong_tags: ["宗门", "成长"]
    narrative_modes: ["多主题副本"]
    tone_guardrails: ["升级必须有代价", "机缘不能白拿"]
    package_cues:
      - "首屏点宗门/机缘/压制关系"
      - "前三章至少一次突破或硬换账"

# ==================== 禁忌清单 ====================
taboos:
  - id: TABOO-001
    content: "主角无脑升级，没有积累和铺垫"
    severity: critical
    checkpoint: "成长场景"

  - id: TABOO-002
    content: "世界观前后矛盾，设定混乱"
    severity: critical
    checkpoint: "世界观描写"

  - id: TABOO-003
    content: "境界压制随意打破，无特殊手段"
    severity: critical
    checkpoint: "战斗场景"

  - id: TABOO-004
    content: "金手指无成长性，一开始就全开"
    severity: warning
    checkpoint: "金手指设计"

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 1.0
  consistency: 1.2      # 一致性更重要
  pacing: 0.9
  ooc: 1.1
  continuity: 1.0
  reader-pull: 0.9

# ==================== 参考扩展文件 ====================
reference_files:
  - reference-notes.md

# ==================== 悬念规划模板 ====================
suspense_planning:
  # ===== 悬念重要性等级 =====
  # B级：悬念是辅助元素，服务于主角成长
  # 修仙流的核心是境界突破、机缘获得、越级挑战，悬念仅用于增加期待感
  # 主要悬念类型：能力来源、身份谜团、传承来历
  importance_level: B

  types:
    short_term:
      definition: "单个事件/副本内的悬念，事件结束时解决"
      reveal_timing: "事件内（3-15章）"
      examples: ["秘境宝藏归属", "小人阴谋真相", "功法来历"]

    mid_term:
      definition: "跨越多个阶段的悬念，与主角成长相关"
      reveal_timing: "30-80章"
      examples: ["金手指真正来源", "宗门隐藏秘密", "师父真实身份"]

    long_term:
      definition: "贯穿全书的核心悬念，世界观真相"
      reveal_timing: "80-200章，核心反转建议100章后"
      examples: ["修仙界真正起源", "主角真实身世", "飞升的真相"]

  reveal_schedule:
    chapter_1_to_3:
      - type: "金手指暗示"
        content: "神秘物品/传承出现，但不揭示真正来源"
        required: true
      - type: "第一个危机解决"
        content: "展示主角潜力"
        required: true

    chapter_5_to_15:
      - type: "金手指初步觉醒"
        content: "能力开始展现，但有限制/代价"
        note: "修仙金手指要有成长性"
      - type: "第一个大机缘"
        content: "获得功法/法宝，但来历保持神秘"

    chapter_15_to_30:
      - type: "势力关系初步展现"
        content: "宗门内部矛盾、外部势力"
      - type: "金手指来历线索"
        content: "暗示金手指的来源，但不给答案"
        note: "只给线索，引发好奇"

    chapter_30_to_60:
      - type: "主角身世线索"
        content: "父母/血脉相关信息"
        note: "只给线索，不给真相"
      - type: "宗门/势力秘密"
        content: "隐藏的阴谋或历史"

    chapter_60_to_100:
      - type: "金手指真正来历"
        content: "揭示金手指的完整来源和作用"
      - type: "重要配角背叛/牺牲"
        content: "增加情感深度"

    chapter_100_to_150:
      - type: "核心反转"
        content: "颠覆读者认知的重大真相"
        examples: ["主角真实身份", "修仙界真正目的", "师父的真正立场"]
        note: "修仙文读者喜欢深度反转，必须有足够铺垫"

    chapter_150_plus:
      - type: "世界观真相"
        content: "修仙体系真正来源、飞升真相等"
      - type: "最终对决"
        content: "与核心敌人的对决"

  suspense_taboos:
    - content: "越级战斗无代价/无特殊手段"
      reason: "破坏力量体系，修仙核心是境界压制"
      severity: critical
    - content: "金手指无成长性，一次性给全"
      reason: "失去后续期待感"
      severity: warning

  foreshadowing:
    principle: "每18章埋设1个新伏笔，每50章回收1个旧伏笔"
    note: "修仙文节奏慢热，悬念密度不宜过高，重点放在成长线索"
    examples:
      short_term: "副本内埋设，副本结束回收"
      mid_term: "第15章埋设，第60章回收"
      long_term: "第1章埋设，第120章+回收"
    status_flow:
      - "潜伏 → 铺垫 → 可回收 → 已回收"
