# 历史古代题材 Profile v3.0
# 网文创作系统 - 目录化配置

name: "历史古代"
display_name: "历史古代"
description: "历史争霸、权谋斗争、穿越历史题材"
version: "3.0"
template: templates/genres/历史古代.md

# ==================== 推进阻力与代价 ====================
progression_constraints:
  resistance_rule: "关键推进必须遭遇真实阻力，不能自动到账。"
  cost_rule: "重要收益应伴随可见代价、暴露或资源损耗。"
  partial_payoff_rule: "阶段胜利以局部收益为主，不宜一次打穿主线矛盾。"
  residual_risk_rule: "每次推进后都应保留残留风险，避免章节收口过满。"


# ==================== 流派细分定义 ====================
sub_genres:
  conquest:
    name: "历史争霸流"
    description: "古代争霸天下"
    core_points: [军事征服, 统一天下, 开创盛世]
    pacing: epic
    examples: [庆余年, 琅琊榜]

  intrigue:
    name: "历史权谋流"
    description: "朝堂权谋斗争"
    core_points: [智谋对决, 扳倒政敌, 权倾朝野]
    pacing: strategic
    examples: [琅琊榜]

  time_travel:
    name: "历史穿越流"
    description: "现代人穿越到古代"
    core_points: [现代知识, 改变历史, 混得风生水起]
    pacing: relaxed
    examples: [庆余年]

  farming_history:
    name: "历史种田流"
    description: "古代生活经营"
    core_points: [发家致富, 改善生活, 温馨日常]
    pacing: warm
    examples: [知否知否应是绿肥红瘦]

# ==================== 节奏参数 ====================
pacing:
  type: 史诗布局型
  tension_ratio: "4:6"
  typical_chapter_length: 4500
  word_count:
    minimum: 4000
    standard: 4000-5500
    long: 5500-7000

# ==================== 爽点配置 ====================
cool_points:
  density: 0.8
  max_interval: 1500

  preferred_types:
    - type: 智谋胜利
      weight: 1.7
      description: "智谋博弈中取得胜利"
      triggers: [计谋, 算计, 布局, 中计, 落网, 臣服, 高明, 算无遗策]

    - type: 权力提升
      weight: 1.5
      description: "地位权力上升"
      triggers: [晋升, 封赏, 权倾, 位极人臣, 重用, 升官, 封爵, 赏赐]

    - type: 军事胜利
      weight: 1.4
      description: "战争中取得胜利"
      triggers: [大捷, 凯旋, 胜利, 破敌, 攻城, 斩将, 旗开得胜, 势如破竹]

    - type: 改变历史
      weight: 1.3
      description: "改变历史走向"
      triggers: [改变, 扭转, 重写, 新局, 开创, 逆转, 史无前例]

  avoid_types:
    - type: 历史细节错误
      weight: 0
      reason: 历史文讲究考据

    - type: 过于现代的表达
      weight: 0.2
      reason: 破坏古典氛围

  combo_bonus:
    consecutive: 0.2
    setup_explosion: 0.3
    contrast: 0.2
    stacking: 0.1

# ==================== Strand 权重 ====================
strand_weights:
  quest: 45
  fire: 30
  constellation: 25

# ==================== 特殊约束 ====================
constraints:
  - id: HIST-001
    description: "历史细节要考究"
    mandatory: true
    checkpoint: 历史描写

  - id: HIST-002
    description: "人物行为要符合时代"
    mandatory: true
    checkpoint: 人物行为

# ==================== 读者期待 ====================
reader_expectations:
  must_satisfy:
    - "历史细节要考究"
    - "人物行为要符合时代"
    - "语言风格要有古典韵味"

  optional_satisfy:
    - "权谋博弈的精彩"
    - "穿越者带来的现代知识优势"
    - "争霸天下的史诗感"

  never_violate:
    - "过于现代的口语表达"
    - "不符合身份地位的称呼"
    - "过于直白的表达方式"

# ==================== 禁忌清单 ====================
taboos:
  - id: TABOO-001
    content: "历史细节错误"
    severity: critical
    checkpoint: "历史描写"

  - id: TABOO-002
    content: "人物行为不符合时代"
    severity: critical
    checkpoint: "人物行为"

  - id: TABOO-003
    content: "过于现代的口语表达"
    severity: warning
    checkpoint: "人物对话"

  - id: TABOO-004
    content: "不符合身份地位的称呼"
    severity: warning
    checkpoint: "人物互动"

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 0.9
  consistency: 1.4
  pacing: 1.0
  ooc: 1.3
  continuity: 1.2
  reader-pull: 1.0

platform_positioning:
  fanqie:
    primary_bucket: "历史脑洞"
    strong_tags: ["权谋", "家国"]
    narrative_modes: ["多主题副本"]
    tone_guardrails: ["历史感不能散", "权力线必须讲层级"]
    package_cues:
      - "首屏点权力危机"
      - "主设定一句话讲清"

reference_files:
  - reference-notes.md
