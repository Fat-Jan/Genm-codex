# 知乎短篇题材 Profile v3.0
# 网文创作系统 - 目录化配置

name: "知乎短篇"
display_name: "知乎短篇"
description: "知乎体故事、第一人称叙事、短篇悬疑题材"
version: "3.0"
template: templates/genres/知乎短篇.md

# ==================== 流派细分定义 ====================
sub_genres:
  zhihu_story:
    name: "知乎体故事流"
    description: "知乎问答体故事"
    core_points: [反转精彩, 故事完整, 引人入胜]
    pacing: compact_short

  first_person:
    name: "第一人称流"
    description: "第一人称叙述"
    core_points: [代入感强, 心理描写, 情感共鸣]
    pacing: emotional

  short_suspense:
    name: "短篇悬疑流"
    description: "短篇悬疑故事"
    core_points: [悬念设置, 真相揭秘, 精彩反转]
    pacing: suspense

# ==================== 节奏参数 ====================
pacing:
  type: 短篇紧凑型
  tension_ratio: "3:7"
  typical_chapter_length: 4500
  word_count:
    minimum: 4000
    standard: 4000-5500
    long: 5500-7000

# ==================== 爽点配置 ====================
cool_points:
  density: 1.0
  max_interval: 1200

  preferred_types:
    - type: 精彩反转
      weight: 1.8
      description: "出人意料的情节转折"
      triggers: [反转, 原来, 竟然, 没想到, 真相, 意外]

    - type: 情感共鸣
      weight: 1.5
      description: "引发读者情感共鸣"
      triggers: [感动, 心酸, 泪目, 共鸣, 遗憾, 后悔]

    - type: 故事完整
      weight: 1.4
      description: "结构完整首尾呼应"
      triggers: [结局, 完整, 呼应, 圆满, 交代, 落幕]

    - type: 悬念设置
      weight: 1.3
      description: "制造悬念吸引读者"
      triggers: [悬念, 疑问, 谜团, 真相, 秘密, 为什么]

  combo_bonus:
    consecutive: 0.2
    setup_explosion: 0.3
    contrast: 0.2
    stacking: 0.1

# ==================== Strand 权重 ====================
strand_weights:
  quest: 35
  fire: 40
  constellation: 25

# ==================== 特殊约束 ====================
constraints:
  - id: ZHIHU-001
    description: "短篇要紧凑，不能拖沓"
    mandatory: true
    checkpoint: 整体节奏

  - id: ZHIHU-002
    description: "反转要有伏笔"
    mandatory: true
    checkpoint: 反转设计

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 1.0
  consistency: 1.1
  pacing: 1.3
  ooc: 1.0
  continuity: 1.2
  reader-pull: 1.2

# ==================== 对话模板库 ====================
dialogue_templates:
  styles:
    zhihu_style: 自然口语化，接地气，善用反问和设问，营造互动感
    first_person: 内心戏丰富，自我吐槽，与读者建立亲切感
    suspense_style: 信息逐步释放，制造悬念，话里有话，暗藏玄机

  typical_dialogues:
    zhihu_qa: |
      "你有没有经历过那种，让你整个人都崩溃的事？"
      我坐在电脑前，看着这个问题，沉默了很久。
      有。
      不只有，而且，说出来你可能不信。
      那是三年前的事了。
      那时候我刚毕业，踌躇满志地进入了一家大公司，以为自己的人生就要开挂了。
      结果——
      入职第一天，我才知道，这家公司的老板，是我前男友。
      而且，还是当年被我甩掉的那个。

    first_person_inner: |
      我叫苏晚，今年二十八岁，是一家普通公司的普通员工。
      直到今天之前，我的人生都普通得不能再普通。
      可是今天——
      我发现自己的男朋友，是公司老板的儿子。
      而我的闺蜜，一直暗恋着他。
      我的车，被人划了。
      我的房子，房东说要涨租。
      我的人生，仿佛在这一天彻底崩塌。

    suspense_dialogue: |
      "你确定，他是自杀？"
      "确定。现场没有打斗痕迹，门从里面锁着，窗户也是。"
      "那这个呢？"我指着地上的一个细节，"你不觉得奇怪吗？"
      对方沉默了。
      我继续道："一个要自杀的人，为什么会在前一天买一张机票？"
      "……"
      "而且，他买的是单程票。"
      "一个要自杀的人，会买机票吗？"

  avoid_patterns:
    - 对话过于书面化，缺乏知乎体的口语感
    - 第一人称叙述过于啰嗦，节奏拖沓
    - 悬疑对话过早暴露真相，缺乏悬念
    - 人物对话千篇一律，缺乏个性

# ==================== 场景描写库 ====================
scene_descriptions:
  life_scene:
    workplace_dilemma: |
      我坐在工位上，盯着电脑屏幕，脑子里一片空白。
      周围是同事们忙碌的身影，键盘敲击声此起彼伏。
      可是我的屏幕上，只有一个空白文档，和老板刚刚发来的消息：
      "下午三点，会议室。"
      四个字，没头没尾。

    relationship_turn: |
      我和他认识三个月了。
      三个月，不算长，也不算短。
      今天是他约我出来的日子，他说有重要的事要告诉我。
      我坐在咖啡厅里，看着窗外的人来人往，心跳得有点快。
      不会是……要表白吧？

  suspense_scene:
    suspense_opening: |
      我女朋友死了。
      三年前，一场车祸。
      我亲眼看着她的车被撞下悬崖，亲眼看着消防员打捞上来那具冰冷的尸体。
      我以为，一切都结束了。
      直到今天。
      我在街上看到了她。

    truth_reveal: |
      "所以，你从一开始就知道真相？"
      我坐在审讯室里，看着对面的人，声音沙哑。
      他笑了笑："不然呢？你以为，这么简单的案子，为什么到现在才破？"
      他继续道："从一开始，我们就知道凶手是谁。只是——"
      "只是我们需要一个证人。而你——"
      他转过头，看着我，眼神中带着一丝怜悯：
      "你从一开始，就是被设计的那个人。"

  twist_scene:
    identity_twist: |
      "你真的以为，我只是一个普通的家庭主妇？"
      我看着面前这个跟了我三年的保姆，脑子里一片混乱。
      她……不是保姆？
      她笑了，笑容和我平时看到的完全不同——不再是那种老实巴交的笑，而是带着一丝锋利。

    motivation_twist: |
      "我杀人，是因为——"
      他停下来，看着我，眼神复杂。
      这个案子，困扰了警方整整三年。
      三年前，一个富商被发现死在家中，死因是中毒。
      所有证据都指向他的妻子——也就是现在我面前这个女人。
      她承认了。
      但她一直不肯说动机。
      "是因为——"她的声音在颤抖，"他杀了我的女儿。"

# ==================== 节奏模板 ====================
pacing_templates:
  single_chapter_curve:
    zhihu: "提问引入15% → 故事开始30% → 发展高潮40% → 反转结尾15%"
    suspense: "悬念设置25% → 调查探索30% → 线索串联30% → 真相揭秘15%"
    emotional: "日常铺垫25% → 情感升温35% → 转折冲突25% → 结局收尾15%"

  typical_examples:
    zhihu_short_complete: |
      opening_10pct: 回答知乎问题，引出故事背景
      intro_15pct: 开始讲述，设置悬念或冲突
      development_30pct: 故事主体，情节逐步推进
      climax_30pct: 故事最高潮，情感或冲突最激烈
      twist_10pct: 出人意料的结果或转折
      ending_5pct: 回应问题，给出结论或开放式结局

# ==================== 开篇模板 ====================
opening_templates:
  hook_types:
    zhihu_qa: 以回答问题的形式开篇，直接引出故事，制造代入感
    suspense: 开篇即设置悬念，让读者迫切想知道真相
    first_person: 用亲身经历的方式开篇，增强真实感和可信度
    twist: 开篇给出一个看似普通的情境，结尾却有惊人反转

  classic_examples:
    zhihu_qa_style: |
      问题：你经历过最尴尬的事是什么？

      谢邀。
      说出来你可能不信，我经历过最尴尬的事，发生在面试现场。
      那是我大学毕业后的第一场正式面试，地点是一家五百强公司，职位是市场助理。
      我准备了一个星期，把可能问到的问题全都准备了一遍，还特意买了一套新西装。
      面试当天，我提前半小时到达，在洗手间整理仪表，确认自己万无一失。
      然后，我自信满满地走进面试室。
      "你好，我是来面试的苏晚。"
      坐在面试官位置上的人，抬起头——
      是我前男友。
      还是被我甩掉的那个。

    suspense_style: |
      我有一个秘密。
      一个埋藏了十年的秘密。
      十年前，我十八岁，刚考上大学，人生一片光明。
      然后，一件事改变了一切。
      那个暑假，我和几个朋友去山里玩，迷了路，在一个废弃的小屋里躲了一夜。
      第二天早上醒来，我发现——
      我的身边，躺着一具尸体。
      一具陌生人的尸体。

    first_person_style: |
      我叫苏晚，今年三十二岁，是一家普通公司的财务主管。
      我的丈夫，叫林远，是一家科技公司的工程师。
      我们结婚五年，有一个四岁的女儿，生活平淡而幸福。
      至少，我一直这么以为。
      直到三天前。