# 现言脑洞题材 Profile v3.0
# 网文创作系统 - 目录化配置

name: "现言脑洞"
display_name: "现言脑洞"
description: "创意设定的现代言情，包含重生、穿越、系统等流派"
version: "3.0"

# ==================== 推进阻力与代价 ====================
progression_constraints:
  resistance_rule: "关键推进必须遭遇真实阻力，不能自动到账。"
  cost_rule: "重要收益应伴随可见代价、暴露或资源损耗。"
  partial_payoff_rule: "阶段胜利以局部收益为主，不宜一次打穿主线矛盾。"
  residual_risk_rule: "每次推进后都应保留残留风险，避免章节收口过满。"


# ==================== 流派细分定义 ====================
sub_genres:
  rebirth_modern:
    name: "重生现言流"
    description: "重生到现代"
    core_points: [先知先觉, 改变命运, 收获真爱]
    pacing: shuangwen

  transmigration_modern:
    name: "穿越现言流"
    description: "古代人穿越到现代"
    core_points: [文化碰撞, 适应现代, 收获爱情]
    pacing: light

  creative_modern:
    name: "创意现言流"
    description: "创意设定的现代言情"
    core_points: [脑洞设定, 甜蜜爱情, 新颖体验]
    pacing: creative

# ==================== 节奏参数 ====================
pacing:
  type: 创意言情型
  tension_ratio: "5:5"
  typical_chapter_length: 4500
  word_count:
    minimum: 4000
    standard: 4000-5500
    long: 5500-7000

# ==================== 爽点配置 ====================
cool_points:
  density: 0.8
  max_interval: 1500

  preferred_types:
    - type: 甜蜜爱情
      weight: 1.6
      description: "甜蜜温馨的感情互动"
      triggers: [甜蜜, 宠溺, 心动, 在一起, 表白, 约会]

    - type: 创意设定
      weight: 1.4
      description: "新颖有趣的设定展开"
      triggers: [穿越, 重生, 系统, 金手指, 异能, 特殊能力]

    - type: 人生逆袭
      weight: 1.3
      description: "改变命运获得成功"
      triggers: [逆袭, 改变, 前世, 重来, 扭转, 翻盘]

    - type: 先知先觉
      weight: 1.2
      description: "利用未来信息获得优势"
      triggers: [知道, 预知, 未来, 前世记忆, 避免, 改变]

  combo_bonus:
    consecutive: 0.2
    setup_explosion: 0.3
    contrast: 0.2
    stacking: 0.1

# ==================== Strand 权重 ====================
strand_weights:
  quest: 30
  fire: 40
  constellation: 30

  warnings:
    quest_max_consecutive: 3
    fire_missing_max: 3
    constellation_missing_max: 15

# ==================== 读者期待管理 ====================
reader_expectations:
  must_satisfy:
    - 创意设定要自洽
    - 感情线要自然发展
    - 对话要有情感温度

  optional_satisfy:
    - 重生逆袭的爽感
    - 古穿今的反差萌
    - 甜宠日常的温馨

  absolutely_not:
    - 对话过于生硬，缺乏情感温度
    - 男主太完美，缺乏人设特点
    - 女主太弱，缺乏主动性

platform_positioning:
  fanqie:
    primary_bucket: "现言脑洞"
    strong_tags: ["创意恋爱", "命运改写"]
    narrative_modes: ["双线并进"]
    tone_guardrails: ["创意设定必须服务情感推进", "女主不能失去主动性"]
    package_cues:
      - "首屏点设定与关系反差"
      - "前三章要出现一次设定/情感双兑现"

# ==================== 禁忌清单 ====================
taboos:
  - id: TABOO-001
    content: 创意设定前后矛盾
    severity: critical
    checkpoint: 设定设计

  - id: TABOO-002
    content: 对话过于生硬缺乏情感温度
    severity: warning
    checkpoint: 人物对话

  - id: TABOO-003
    content: 男主太完美缺乏人设特点
    severity: warning
    checkpoint: 男主塑造

  - id: TABOO-004
    content: 女主太弱缺乏主动性
    severity: warning
    checkpoint: 女主塑造

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 0.9
  consistency: 1.1
  pacing: 1.0
  ooc: 1.0
  continuity: 1.0
  reader-pull: 1.2

# ==================== 对话模板库 ====================
dialogue_templates:
  style_definitions:
    sweet_style: 甜蜜温馨，充满粉红泡泡，用词温柔，多撒娇和小情趣
    rebirth_style: 犀利果断，内心独白丰富，表面温柔内心腹黑，话中有话
    ancient_modern: 古韵与现代碰撞，用词古雅但理解现代，制造反差萌

  typical_dialogues:
    sweet_interaction: |
      "你怎么来了？"苏晚抬头，看到站在门口的顾晏，眼底闪过一丝惊喜。
      "想你了。"顾晏走过来，自然地揉了揉她的头发，"不可以吗？"
      苏晚脸颊微红，小声嘟囔："又油嘴滑舌……"
      "只对你。"顾晏弯下腰，与她平视，眼中是藏不住的温柔，"只对你。"

    rebirth_counterattack: |
      "林姐姐，你这身衣服，是不是去年的款啊？"对方的声音带着明显的嘲讽。
      苏晚一笑，手指轻轻抚过衣袖："是吗？但我觉得，衣服好不好看，不在于年份，在于——谁穿。"
      对方脸色一僵。
      苏晚继续道，语气轻柔却字字珠玑："况且，真正的高贵，从来不是靠衣服堆出来的。你说呢？"
      内心却想：上辈子你用这招羞辱我，这辈子，同样的戏码，该换换了。

    ancient_modern_contrast: |
      "请问……这铁盒子是如何跑动的？"她睁着好奇的大眼睛，看着面前飞驰而过的汽车。
      他愣了一下："你是说汽车？它有发动机，靠汽油——"
      "汽油？"她歪头，"可是……不会累吗？"
      "……不会。"
      "真乃神物也！"她惊叹道，随即低头看着自己的衣服，"那……这些衣物为何如此短小？不冷吗？"
      他看着她穿着的古装长裙，忍不住笑了："你确定要问这个？"
      她认真地："确定。"
      他无奈地叹气，却也耐心地开始解释起来……

  avoid_patterns:
    - 对话过于生硬，缺乏情感温度
    - 男主太完美，缺乏人设特点
    - 女主太弱，缺乏主动性
    - 甜宠过度腻人，缺乏其他情感层次

# ==================== 场景描写库 ====================
scene_descriptions:
  sweet_scenes:
    date_night: |
      华灯初上，街边的霓虹灯渐次亮起。
      苏晚挽着顾晏的手臂，两人漫步在城市的夜色中。
      "饿了吗？"顾晏低头看她，声音一如既往的温柔。
      "有点。"苏晚诚实地点头，目光却被旁边的糖炒栗子吸引。
      顾晏顺着她的视线看过去，嘴角的弧度加深了几分："等着。"
      几分钟后，他捧着一袋热乎乎的糖炒栗子回来，顺手剥开一个，递到她嘴边："小心烫。"
      苏晚张开嘴接过，甜糯的味道在舌尖蔓延，忍不住眯起眼睛："好吃！"
      顾晏看着她满足的样子，眼底是化不开的温柔："喜欢就好。"
      她没注意到，他的目光一直落在她身上，从未离开。

    surprise_confession: |
      空气突然安静下来。
      苏晚愣愣地看着面前说出那句"我喜欢你"的男人，一时间大脑空白。
      顾晏却坦然地迎上她的目光，没有丝毫退缩："怎么，不相信？"
      "我……"苏晚试图组织语言，却发现喉咙像被什么东西堵住了一样。
      "没关系。"顾晏轻轻握住她的手，"你可以不相信，但我会证明。"
      他的声音很轻，却每一个字都清晰地传进她耳朵里："直到你相信为止。"
      夜风拂过，吹乱了她额前的碎发，也吹进了她原本平静的心湖。

  rebirth_scenes:
    banquet_face_slap: |
      宴会厅的水晶吊灯投下璀璨的光芒，衣香鬓影间，每个人脸上都挂着得体的微笑。
      苏晚站在角落，手里端着一杯香槟，目光扫过场中的人群——上辈子，她在这个宴会上一无所有，被所有人轻视。
      这辈子，她要让所有人刮目相看。
      "哟，这不是苏家的大小姐吗？"一个尖细的声音从身后传来，"怎么一个人站在这儿，是不是没人理你啊？"
      苏晚转身，看到那张熟悉的、刻薄的脸，唇角上扬。
      "张小姐。"她道，"有没有人理，我想——"她目光扫过正朝这边走来的几个商业大佬，"不是你能决定的。"
      "苏小姐，"一位白发苍苍的老者走近，脸上带着热情的笑容，"关于上次的合作，我们想跟您详谈……"
      张小姐的脸色瞬间变得精彩纷呈。
      苏晚看着她僵住的表情，心中暗爽：上辈子你们让我出尽洋相，这辈子，轮到我了。

    workplace_counterattack: |
      会议室里气氛凝重，所有人的目光都集中在投影屏上。
      "这个方案，有什么问题？"苏晚站在台上，目光自信而从容。
      座位上，一个中年男人皱起眉头："苏总监，这个方案太冒险了，如果失败——"
      "不会失败。"苏晚打断他，语气平静却坚定，"我知道它不会失败。"
      内心却在想：上辈子，这个方案被你们否决，结果让竞争对手占了先机。这辈子，我绝不会再让历史重演。
      "数据呢？你说不会失败，有什么依据？"
      苏晚一笑，调出下一张PPT："根据我的调研，这个方向在未来三年会有超过200%的增长空间……"
      她一一道来，每一个数据都精准无比，每一个论点都击中要害。
      最后，她环视众人，嘴角勾起自信的弧度："还有问题吗？"
      一片沉默。

  ancient_modern_scenes:
    first_arrival: |
      当她再次睁开眼睛，看到的是完全陌生的景象——高耸入云的建筑，飞驰而过的"铁盒子"，穿着稀奇古怪的人群……
      "这……这是何处？"她喃喃道，声音沙哑得不像自己。
      "这是2024年的城市，你是谁？怎么穿成这样？"
      她转过头，看到一个穿着短袖短裤的年轻女孩，正用奇怪的眼神打量着她。
      "2024年？"她皱眉，"敢问姑娘，可是崇宁二十三年？"
      "哈？"女孩瞪大眼睛，"你在拍戏吗？崇宁是什么鬼……"
      她低头看着自己的身体——还是自己的身体，却穿着陌生的衣裳，站在陌生的地方。
      她抬头望向天空，却没有看到熟悉的月亮，只有无数闪烁的"星星"——那是灯，灯组成的夜晚。
      "我……真的穿越了？"

    culture_clash: |
      "所以，你们这个时代，女子可以……自己选择夫婿？"
      苏晚看着她认真的眼神，忍不住笑了："对，不仅可以自己选择，还可以选择不结婚。"
      "不结婚？！"她的眼睛瞪得更大了，"那岂不是……不孝有三无后为大？"
      "这个时代，"苏晚耐心解释，"没有人会这么想了。女性可以有自己的事业，自己的选择。"
      她沉默了，许久才缓缓道："这……真的是一个很好的时代。"
      苏晚看着她有些羡慕的眼神，心中一阵柔软："你会习惯的。"
      "我一定会的。"她抬起头，眼中渐渐燃起希望的光芒，"既然老天让我来到这里，那我就要……活出不一样的精彩！"

# ==================== 节奏模板 ====================
pacing_templates:
  chapter_emotion_curve:
    sweet_pacing: 日常铺垫30% → 甜蜜互动40% → 小波折10% → 化解矛盾20%
    rebirth_pacing: 困境铺垫20% → 金手指出现25% → 计划实施30% → 反击成功25%
    ancient_modern_pacing: 文化碰撞40% → 学习适应30% → 制造笑点20% → 情感升温10%

  typical_pacing_examples:
    sweet_date: |
      开场(15%): 日常场景，主角的状态，为约会做铺垫
      铺垫(15%): 约会准备的细节，内心的期待
      约会过程(40%): 约会中的甜蜜互动，心跳加速的瞬间，小惊喜
      小波折(10%): 小小的误会或阻碍，增加张力
      化解(20%): 矛盾化解，更深层次的了解，甜蜜收尾

    rebirth_counterattack: |
      开场(20%): 展示主角当前困境或被轻视的处境
      转折(25%): 利用重生记忆或金手指，开始布局
      实施(30%): 按计划行事，展示能力和智慧
      反击(25%): 成功逆袭，让曾经轻视自己的人目瞪口呆

# ==================== 开篇模板 ====================
opening_templates:
  hook_types:
    rebirth_opening: 主角重生回到过去，带着对未来的记忆，开始改变命运
    unexpected_encounter: 男女主以意想不到的方式相遇，制造命运感
    transmigration_opening: 主角穿越到陌生的时空，开始新的人生
    sweet_encounter: 男女主甜蜜初遇，一见钟情或欢喜冤家

  classic_opening_examples:
    rebirth: |
      "我们分手吧。"
      这句话，苏晚听了两遍。
      第一遍是在三年前，她站在公司的电梯里，对面是她爱了整整五年的男人，冷漠地说出这句话。
      第二遍，是在此刻——
      她睁开眼，看到的依然是那个男人的脸，那句话依然在耳边回荡。
      可是……
      她低头看着自己的手，年轻了三年的手。
      她环顾四周，熟悉的办公室，熟悉的装潢，熟悉的一切——
      这是三年前？
      她重生了？
      苏晚感受到胸腔里剧烈跳动的心脏，不是因为伤心，而是因为——希望。
      上辈子，她因为这句话一蹶不振，失去了一切。
      这辈子，她不会再犯同样的错误。
      她抬起头，直视面前男人的眼睛，嘴角勾起一抹他从未见过的弧度：
      "好。"

    unexpected_meeting: |
      苏晚的人生从没想过会和这个男人有任何交集——他是云城最年轻的亿万富翁，是所有女人梦寐以求的黄金单身汉。
      而她，只是一个普通的职场女性，每天为生计奔波。
      直到那天。
      暴雨如注，她没带伞，站在公司门口不知所措。
      一辆黑色的迈巴赫缓缓停在她面前，车窗降下，露出一张英俊得过分的脸。
      "上车。"他的声音低沉而有磁性。
      苏晚愣住了："我……我不认识你。"
      "很快就会认识了。"他侧头，嘴角含笑，"我是顾晏，你的……未来丈夫。"
      苏晚："……？"
      她发誓，这辈子从没这么懵过。

    transmigration: |
      最后的记忆，是一阵剧烈的疼痛。
      当她再次醒来，发现自己躺在一个陌生的房间里——白色的墙壁，明亮的灯光，还有……奇怪的方形物体发出着刺眼的光。
      "你醒了？"一个声音从旁边传来。
      她转过头，看到一个穿着稀奇古怪的女人——上衣短得露出手臂，裤子紧得勾勒出腿部线条。
      "你……你是何人？这里是何处？"她挣扎着想要坐起来，却发现自己也很虚弱。
      "我叫林薇，这是医院。你晕倒在路边，我送你来的。"
      "医院？"她皱眉，"是什么地方？"
      林薇愣住了："你……失忆了？"
      她摇摇头，看着眼前的一切，喃喃道："我不知道这是哪里……我只知道，我不属于这里。"
      林薇的表情变得更加奇怪："什么意思？"
      她深吸一口气，缓缓道出自己的身份："我名苏婉清，是崇宁年间的……公主。"
      一片死寂。

    sweet_encounter: |
      第一次见面，苏晚就把顾晏的西装咖啡了。
      "对不起对不起！"她手忙脚乱地拿纸巾擦拭，结果越擦越糟，咖啡渍反而蔓延得更大了。
      顾晏低头看着自己的西装，又看了看面前慌乱的女孩，嘴角的笑意渐渐加深。
      "没关系。"他说，声音意外地温柔。
      "可是你的西装……"
      "可以洗。"
      "我还是赔你一件吧……"
      "不用。"顾晏的笑意更明显了，"如果你实在过意不去，可以——"
      苏晚抬起头，对上他含笑的眼睛："可以什么？"
      "可以请我喝杯咖啡。"他看着她，"当赔罪。"
      苏晚愣了一下，然后脸颊发烫："……好。"
      她不知道的是，从这一刻起，她的人生，已经悄然改变。
