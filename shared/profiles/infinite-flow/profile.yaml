# 无限流题材Profile

name: "无限流"
version: "3.0"
template: templates/genres/无限流.md

# ==================== 流派细分定义 ====================
sub_genres:
  main_god_space:
    description: "主神发布任务，穿梭各个世界"
    core_points: ["副本通关", "收集能力", "团战获胜"]
    pacing: "快节奏"
    examples: "《无限恐怖》《无限未来》"
  myriad_worlds:
    description: "穿越不同影视/动漫/游戏世界"
    core_points: ["世界探索", "获得能力", "改变剧情"]
    pacing: "多世界切换"
    examples: "《诸天纪》《位面电梯》"
  horror_set:
    description: "在恐怖电影/游戏中生存"
    core_points: ["恐怖求生", "破解规则", "反杀鬼怪"]
    pacing: "紧张刺激型"
    examples: "《恐怖片场》《惊悚乐园》"
  survival_game:
    description: "参与各种生存游戏，失败即死"
    core_points: ["智斗取胜", "发现漏洞", "绝境翻盘"]
    pacing: "高压紧张型"
    examples: "《全球进化》《生存游戏》"

# ==================== 节奏参数 ====================
pacing:
  type: 快节奏高压
  tension_ratio: "2:8"
  typical_chapter_length: 4500
  word_count_range:
    min: 4000        # v4.0: 最低字数要求提升
    standard: 4000-5500
    long: 5500-7000

  instance_pacing:
    entry: "开篇悬念"
    exploration: "发现规则/线索"
    crisis_desc: "第一次危机"
    climax: "破解/通关"
    reward: "结算收获"

# ==================== 爽点配置 ====================
# 爽点评分系统 v2.0 - 加权智能计算
#
# 基础公式: 加权爽点密度 = Σ(爽点权重) / (字数/1000)
#
# 权重配置说明:
#   - 权重范围: 0.0-2.0，推荐范围 0.8-1.5
#   - 默认权重: 打脸爽(1.4), 越级爽(1.4), 机缘爽(1.2), 逆袭爽(1.2),
#               升级爽(1.1), 情感爽(1.1), 收获爽(1.0), 装逼爽(1.0), 扮猪吃虎(1.3)
#   - 组合加成: 连续爽点(+0.2), 铺垫后爆发(+0.3), 对比反差(+0.2), 多重叠加(+0.1/层)
#
# 平台标准(2026):
#   七猫: 1.3-1.8/千字  番茄: 1.2-1.5/千字  起点: 0.8-1.0/千字  晋江: 1.0/千字
#
cool_points:
  density_required: 1.2/千字  # 无限流节奏紧张
  max_interval: 1000字    # 超过此值需预警

  # 权重类型配置 - 定义本题材的爽点偏好
  # 权重越高，该类型爽点对总评分的贡献越大
  preferred_types:
    - type: 副本通关
      weight: 1.8
      description: "成功破解副本规则，通关存活"
      trigger_words: [通关, 完成, 成功, 存活, 破解, 通过, 结算, 奖励]
    - type: 绝境翻盘
      weight: 1.6
      description: "看似必死的情况下找到生路"
      trigger_words: [翻盘, 逆转, 转机, 破局, 出路, 活路, 救命, 反杀]
      note: 翻盘要有伏笔，不能太突兀
    - type: 能力觉醒
      weight: 1.5
      description: "在危机中觉醒/升级能力"
      trigger_words: [觉醒, 进化, 变强, 升级, 突破, 新能力, 潜能, 激发]
    - type: 规则反杀
      weight: 1.4
      description: "利用规则漏洞反杀敌人/鬼怪"
      trigger_words: [反杀, 利用, 规则, 弱点, 漏洞, 将计就计, 以其人之道]
    - type: 团战获胜
      weight: 1.3
      description: "团队协作击败强敌"
      trigger_words: [配合, 协作, 团队, 赢了, 击败, 活下来, 牺牲, 胜利]
      note: 队友要有独立性
    - type: 规则破解
      weight: 1.4
      description: "发现副本隐藏规则"
      trigger_words: [发现, 规则, 真相, 秘密, 原来, 关键, 线索, 逻辑]

  # 避免类型 - 权重0表示完全避免，低权重表示效果打折
  avoid_types:
    - type: 主角无限叠加能力
      weight: 0.3
      reason: 无限流讲究策略，不是无脑堆能力
    - type: 队友全是工具人
      weight: 0.2
      reason: 队友要有独立人格

  # 组合加成配置
  combo_bonus:
    continuous_cool: 0.2       # 警告: 可能导致阈值过高，谨慎使用
    foreshadow_burst: 0.4     # 无限流铺垫后爆发效果更好
    contrast: 0.3       # 绝境与生路形成强烈对比
    multi_stack: 0.1       # 每层加成，上限+0.3

# ==================== Strand权重 ====================
strand_weights:
  quest: 0.45        # 副本通关主线
  fire: 0.35         # 危机爆发
  constellation: 0.20 # 队友关系

  warning_threshold:
    quest_continuous_limit: 15章  # 一个副本可以较长
    fire_missing_limit: 3章    # 必须有危机感
    constellation_missing_limit: 5章  # 队友互动

# ==================== 特殊约束 ====================
constraints:
  - ID: RULE-001
    description: "副本规则必须自洽，不能前后矛盾"
    enforced: true
    check_point: 副本设计
  - ID: RULE-002
    description: "队友要有独立人格，不能全是工具人"
    enforced: true
    check_point: 队友塑造
  - ID: RULE-003
    description: "危险要有真实感，主角不能太轻松"
    enforced: true
    check_point: 危机设计
  - ID: RULE-004
    description: "主角能力要有合理来源，不能无限叠加"
    enforced: false
    check_point: 能力获取

# ==================== 黄金三章 ====================
golden_three_chapters:
  chapter_1:
    opening: 主角进入第一个副本
    core: 建立无限流世界观
    conflict: 第一次面对死亡威胁
    hook: 发现副本有隐藏规则
    word_count: 4000-5000       # v4.0: 最低 4000 字

  chapter_2:
    development: 探索副本，发现线索
    trial: 尝试破解规则
    growth: 第一次死里逃生
    hook: 发现更大的秘密
    word_count: 4000-5500

  chapter_3:
    climax: 破解副本核心规则
    worldview: 展示主神空间/积分系统
    reward_content: 获得能力/道具奖励
    hook: 新的副本即将开启
    word_count: 4000-5500

# ==================== 读者期待管理 ====================
reader_expectations:
  must_satisfy:
    - "副本规则要自洽"
    - "危机要有真实感"
    - "主角要有智慧"
    - "队友不能全是工具人"
  optional_satisfy:
    - "有感情线但不喧宾夺主"
    - "有搞笑调剂"
  must_not:
    - "规则前后矛盾"
    - "主角能力无限叠加"
    - "队友毫无存在感"

# ==================== 禁忌清单 ====================
taboos:
  - ID: TABOO-001
    content: "副本规则前后矛盾"
    severity: "critical"
    check_point: "副本设计"
  - ID: TABOO-002
    content: "主角能力无限叠加，没有代价"
    severity: "critical"
    check_point: "能力获取"
  - ID: TABOO-003
    content: "队友毫无个性，纯粹工具人"
    severity: "warning"
    check_point: "队友塑造"

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 1.2     # 爽点密度要高
  consistency: 1.3    # 规则一致性最重要
  pacing: 1.1
  ooc: 1.0
  continuity: 1.2     # 前后连贯
  reader-pull: 1.1

# ==================== 写作风格提示 ====================
writing_style:
  anti_ai_style:
    reference: references/writing/anti-ai-style.md
    core: [删除"淡淡的/微微/不禁", 展示代替说明, 打破三段式]

  dialogue:
    style: "紧张直接"
    description: "危机中对话简洁有力"
    avoid: ["废话太多", "无关话题"]

  description_style:
    crisis_desc: "紧张感要强"
    rules_desc: "规则要清晰易懂"
    clear_desc: "要有成就感"

  pacing:
    within_instance: "紧凑高压"
    between_instances: "可以稍作喘息"

# ==================== 实体标签 ====================
entity_tags:
  instance: <entity type="副本" name="副本名" desc="规则" tier="难度" reward="奖励" danger="危险度"/>
  ability: <entity type="能力" name="能力名" desc="效果" tier="等级" cost="代价"/>
  item: <entity type="道具" name="道具名" desc="效果" tier="等级" uses="使用次数"/>
  teammate: <entity type="队友" name="名字" desc="性格" tier="实力" skill="特长" status="状态"/>

# ==================== 对话模板库（v3.0 新增）====================
dialogue_templates:
  style_definition:
    instance_tense: "高压环境下的简洁对话"
    team_cooperation: "任务中的分工配合"
  typical_dialogues:
    instance_start: |
      "欢迎来到恐怖片场，本次副本：午夜凶铃。"
      "存活条件：活过七天。祝各位……好运。"
    crisis_moment: |
      "东西在你后面！快闪开！"
      "该死，这东西怎么杀不死！"
    rule_discovery: |
      "等等……我发现了一个规律。每次它出现，灯光都会闪烁三次。"
      "你是说……我们可以在它出现前预警？"
    team_sacrifice: |
      "你们先走，我来拖住它！"
      "不——！"
      "记住我的名字……别让我白死！"
    instance_clear: |
      【恭喜小队成功通关，存活人数：3/7】
      "七个人进来，只有三个人出去……"
      "这就是无限世界，适应或者死亡。"
  avoid_patterns:
    - "危机中废话太多"
    - "队友毫无个性的工具人对话"

# ==================== 场景描写库（v3.0 新增）====================
scene_description:
  instance_entry:
    teleport_scene: |
      "眼前一黑，再睁开眼时，已经身处一个陌生的地方。空气中弥漫着腐朽的气味，远处传来诡异的低语声——欢迎来到第一个副本。"
    instance_atmosphere: |
      "破旧的医院走廊，忽明忽暗的灯光，墙上的血迹还未干透。脚步声在空旷的走廊里回响，但那不是他们的脚步声——有什么东西在后面跟着。"
  battle_scene:
    ghost_encounter: |
      "那东西从黑暗中浮现，苍白扭曲的面孔，空洞的眼眶里没有眼球。它张开嘴，发出的不是尖叫，而是某种低沉的、能穿透灵魂的哀嚎。"
    counter_attack: |
      "最后一颗子弹射入它的眉心，它停顿了一下，然后——开始狂笑。'你们以为，这东西能杀死我？'"
  rule_breaking:
    finding_clues: |
      "翻开泛黄的日记本，一行血红色的字迹跃入眼帘：'不要相信任何穿红衣服的人。'就在这时，他感觉后背一阵发凉——他的队友，正穿着一件红色的外套。"
    clearing_moment: |
      "随着最后一个鬼魂消散，整个空间开始崩塌。熟悉的光芒再次出现——他们成功了。这一次。"

# ==================== 节奏模板（v3.0 新增）====================
pacing_templates:
  chapter_emotion_curve:
    exploration_type: "进入副本(15%) → 探索环境(25%) → 发现线索(30%) → 危机爆发(30%)"
    combat_type: "危机出现(20%) → 战斗过程(40%) → 转折(30%) → 暂时安全(10%)"
    cracking_type: "困境铺垫(20%) → 线索发现(30%) → 推理过程(30%) → 真相揭晓(20%)"
  typical_pacing_example:
    instance_chapter: "进入副本 → 探索环境发现异样 → 遭遇第一次危机 → 发现关键线索 → 尝试破解 → 成功或新危机"

# ==================== 悬念规划模板（v4.0 新增）====================
suspense_planning:
  # ===== 悬念重要性等级 =====
  # A级：悬念是重要组成部分，与生存和副本通关紧密相关
  # 无限流的核心是副本通关、规则破解、团队协作，悬念服务于生存压力
  # 双重悬念管理：副本悬念 + 主神空间悬念
  suspense_importance_level: A级

  # 悬念类型定义
  type:
    short_suspense:
      definition: "单个副本内的悬念，副本结束时解决"
      reveal_timing: "副本内（3-10章）"
      examples_list: ["副本规则真相", "鬼怪弱点", "隐藏线索"]

    mid_suspense:
      definition: "跨越多个副本的悬念，主角成长相关"
      reveal_timing: "20-50章"
      examples_list: ["金手指完全觉醒", "主角身世线索", "主神空间规则深化"]

    long_suspense:
      definition: "贯穿全书的核心悬念，最终真相"
      reveal_timing: "50-150章，核心反转建议80章后"
      examples_list: ["主神空间真相", "主角最终命运", "核心反派身份"]

  # 悬念揭晓时机建议（基于经典无限流作品分析）
  reveal_timing:
    chapter_1:
      - type: "世界观建立"
        content: "主神空间存在，副本机制"
        required: true

    chapters_1_3:
      - type: "第一个副本通关"
        content: "展示规则破解能力"
        required: true
      - type: "金手指暗示"
        content: "主角有特殊之处，但不完全觉醒"
        suggested: true

    chapters_5_15:
      - type: "金手指初步觉醒"
        content: "主角能力开始显现，但有代价/限制"
        note: "不要一次性给全，要逐步解锁"
      - type: "团队初步形成"
        content: "核心队友确定"

    chapters_15_30:
      - type: "主线目标揭示"
        content: "主角为什么要变强？复仇？救人？逃离？"
        note: "不要太早给全部答案，先给动机"
      - type: "主神空间规则深化"
        content: "积分系统、兑换系统、小队竞争"

    chapters_30_50:
      - type: "势力登场"
        content: "裁决者、其他小队、反派组织"
      - type: "主角身世线索"
        content: "暗示主角与主神空间的关联"
        note: "只给线索，不给答案"

    chapters_50_80:
      - type: "核心能力完全觉醒"
        content: "金手指进化/升级"
      - type: "重要配角牺牲/离开"
        content: "增加情感深度"

    chapters_80_120:
      - type: "核心反转"
        content: "颠覆读者认知的重大真相"
        examples_list: ["主角的真实身份", "主神的真正目的", "反派的真实关系"]
        note: "这是最重大的揭秘，必须有足够铺垫"

    chapters_120_plus:
      - type: "最终真相"
        content: "所有悬念的最终答案"
      - type: "最终决战"
        content: "与核心敌人的对决"

  # 不同子流派的悬念节奏
  sub_genre_pacing:
    main_god_space:
      main_god_secret: "持续发现"
      teammate_fate: "随时可能死亡"
      main_god_truth: "60-100章"
      description: "悬念在主神目的和团队生存"

    myriad_worlds:
      world_secrets: "每个世界有悬念"
      cross_world_clues: "持续积累"
      ultimate_truth: "100章+"
      description: "悬念在探索和跨世界伏笔"

    horror_set:
      ghost_rules: "每个副本内"
      set_truth: "30-60章"
      director_existence: "50-80章"
      description: "悬念在规则破解和恐怖真相"

    survival_game:
      game_rules: "每局游戏内"
      organizer_purpose: "30-50章"
      world_truth: "60-100章"
      description: "悬念在智斗和游戏背后的阴谋"

  # 无限流悬念禁忌
  taboos_list:
    - content: "第20章前揭示核心反转"
      reason: "太快，没有足够铺垫，读者没投入就知道了"
      severity: "critical"
    - content: "金手指一次性给全"
      reason: "失去成长空间，后续没有期待感"
      severity: "warning"
    - content: "所有悬念都在副本结束时解决"
      reason: "没有长线悬念，读者没有追读动力"
      severity: "warning"
    - content: "主线目标迟迟不明确"
      reason: "超过30章读者还不知道主角要干什么"
      severity: "warning"

  # 伏笔埋设节奏（A级：中高密度，双重管理）
  foreshadowing:
    principles: "每8章至少埋设1个新伏笔，每25章回收1个旧伏笔"
    description_note: "无限流有副本悬念和主神悬念双重管理，副本内伏笔密集，跨副本伏笔要有连续性"
    examples_list:
      short_term: "副本第1章埋设，副本结束回收"
      mid_term: "第8章埋设，第30章回收"
      long_term: "第1章埋设，第80章回收"
    status_flow:
      - "🟢潜伏 → 🟡铺垫 → 🟠可回收 → ⚪已回收"

# ==================== 开篇模板（v3.0 新增）====================
opening_templates:
  hook_types:
    horror_opening: "突然被拉入恐怖世界"
    main_god_choice: "面临生死抉择"
    survival_opening: "被迫参与死亡游戏"
  classic_opening_examples:
    horror_opening: |
      "电脑屏幕突然亮起，一行血红色的字浮现：
      【想明白生命的意义吗？想真正的……活着吗？】
      他的手指不受控制地点向了'是'。
      下一秒，眼前一黑。当他再次睁开眼，自己正站在一条阴暗的走廊里，远处传来婴儿的啼哭声……"
    survival_opening: |
      "欢迎来到第101号副本：午夜医院。存活条件：在三天内找到出口，且——不要被护士发现。
      警报声响起，头顶的红灯开始闪烁。
      游戏开始了。"