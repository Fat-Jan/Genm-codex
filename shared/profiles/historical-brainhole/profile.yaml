# 历史脑洞题材 Profile v3.0
# 网文创作系统 - 目录化配置

name: "历史脑洞"
display_name: "历史脑洞"
description: "架空历史、穿越重生、创意历史题材"
version: "3.0"
template: templates/genres/历史脑洞.md

# ==================== 推进阻力与代价 ====================
progression_constraints:
  resistance_rule: "关键推进必须遭遇真实阻力，不能自动到账。"
  cost_rule: "重要收益应伴随可见代价、暴露或资源损耗。"
  partial_payoff_rule: "阶段胜利以局部收益为主，不宜一次打穿主线矛盾。"
  residual_risk_rule: "每次推进后都应保留残留风险，避免章节收口过满。"


# ==================== 流派细分定义 ====================
sub_genres:
  alternate_history:
    name: "架空历史流"
    description: "架空历史背景"
    core_points: [历史改编, 创意设定, 不同于正史]
    pacing: creative

  time_travel:
    name: "历史穿越流"
    description: "穿越到历史时期"
    core_points: [现代知识, 改变历史, 混得风生水起]
    pacing: shuangwen

  rebirth:
    name: "历史重生流"
    description: "重生到历史时期"
    core_points: [先知先觉, 改变命运, 历史逆袭]
    pacing: counterattack

# ==================== 节奏参数 ====================
pacing:
  type: 创意历史型
  tension_ratio: "4:6"
  typical_chapter_length: 4500
  word_count:
    minimum: 4000
    standard: 4000-5500
    long: 5500-7000

# ==================== 爽点配置 ====================
cool_points:
  density: 0.8
  max_interval: 1500

  preferred_types:
    - type: 改变历史
      weight: 1.6
      description: "利用现代知识或先知先觉改变历史走向"
      triggers: [历史, 改变, 穿越, 重生, 先知, 逆袭, 翻盘, 预言]

    - type: 创意设定
      weight: 1.5
      description: "架空世界的独特创意设定"
      triggers: [架空, 设定, 创意, 新奇, 独特, 从未, 首创]

    - type: 历史逆袭
      weight: 1.4
      description: "从底层逆袭到权力巅峰"
      triggers: [逆袭, 飞黄腾达, 一步登天, 权倾朝野, 布衣, 寒门]

    - type: 智斗权谋
      weight: 1.3
      description: "朝堂或战场上的智慧博弈"
      triggers: [计谋, 算计, 布局, 权谋, 阴谋, 阳谋, 破局]

  combo_bonus:
    consecutive: 0.2
    setup_explosion: 0.3
    contrast: 0.2
    stacking: 0.1

# ==================== Strand 权重 ====================
strand_weights:
  quest: 45
  fire: 30
  constellation: 25

# ==================== 特殊约束 ====================
constraints:
  - id: HISTB-001
    description: "架空设定要自洽"
    mandatory: true
    checkpoint: 世界观

# ==================== 读者期待 ====================
reader_expectations:
  must_satisfy:
    - "架空设定要自洽"
    - "历史感要有，但可以创新"
    - "语言风格要有古典韵味"

  optional_satisfy:
    - "穿越者带来的现代知识优势"
    - "改变历史的爽感"
    - "架空王朝的创意设定"

  never_violate:
    - "对话过于现代化，破坏历史氛围"
    - "文言文使用过度，影响阅读流畅性"
    - "人物对话千篇一律，缺乏个性"

# ==================== 平台定位 ====================
platform_positioning:
  fanqie:
    primary_bucket: "历史脑洞"
    strong_tags: ["穿越", "权谋"]
    narrative_modes: ["多主题副本"]
    tone_guardrails: ["历史感不能被现代腔冲掉", "创意设定必须自洽"]
    package_cues:
      - "历史反差点前置"
      - "主设定一句话讲清"

# ==================== 禁忌清单 ====================
taboos:
  - id: TABOO-001
    content: "架空设定前后矛盾"
    severity: critical
    checkpoint: "世界观"

  - id: TABOO-002
    content: "对话过于现代化破坏历史氛围"
    severity: warning
    checkpoint: "人物对话"

  - id: TABOO-003
    content: "文言文使用过度影响阅读"
    severity: warning
    checkpoint: "语言风格"

  - id: TABOO-004
    content: "女性角色过于弱势缺乏主体性"
    severity: warning
    checkpoint: "女性角色"

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 0.9
  consistency: 1.3
  pacing: 1.0
  ooc: 1.1
  continuity: 1.1
  reader-pull: 1.0

# ==================== 参考扩展文件 ====================
reference_files:
  - reference-notes.md
