# 历史脑洞题材 Profile v3.0
# 网文创作系统 - 目录化配置

name: "历史脑洞"
display_name: "历史脑洞"
description: "架空历史、穿越重生、创意历史题材"
version: "3.0"
template: templates/genres/历史脑洞.md

# ==================== 推进阻力与代价 ====================
progression_constraints:
  resistance_rule: "关键推进必须遭遇真实阻力，不能自动到账。"
  cost_rule: "重要收益应伴随可见代价、暴露或资源损耗。"
  partial_payoff_rule: "阶段胜利以局部收益为主，不宜一次打穿主线矛盾。"
  residual_risk_rule: "每次推进后都应保留残留风险，避免章节收口过满。"


# ==================== 流派细分定义 ====================
sub_genres:
  alternate_history:
    name: "架空历史流"
    description: "架空历史背景"
    core_points: [历史改编, 创意设定, 不同于正史]
    pacing: creative

  time_travel:
    name: "历史穿越流"
    description: "穿越到历史时期"
    core_points: [现代知识, 改变历史, 混得风生水起]
    pacing: shuangwen

  rebirth:
    name: "历史重生流"
    description: "重生到历史时期"
    core_points: [先知先觉, 改变命运, 历史逆袭]
    pacing: counterattack

# ==================== 节奏参数 ====================
pacing:
  type: 创意历史型
  tension_ratio: "4:6"
  typical_chapter_length: 4500
  word_count:
    minimum: 4000
    standard: 4000-5500
    long: 5500-7000

# ==================== 爽点配置 ====================
cool_points:
  density: 0.8
  max_interval: 1500

  preferred_types:
    - type: 改变历史
      weight: 1.6
      description: "利用现代知识或先知先觉改变历史走向"
      triggers: [历史, 改变, 穿越, 重生, 先知, 逆袭, 翻盘, 预言]

    - type: 创意设定
      weight: 1.5
      description: "架空世界的独特创意设定"
      triggers: [架空, 设定, 创意, 新奇, 独特, 从未, 首创]

    - type: 历史逆袭
      weight: 1.4
      description: "从底层逆袭到权力巅峰"
      triggers: [逆袭, 飞黄腾达, 一步登天, 权倾朝野, 布衣, 寒门]

    - type: 智斗权谋
      weight: 1.3
      description: "朝堂或战场上的智慧博弈"
      triggers: [计谋, 算计, 布局, 权谋, 阴谋, 阳谋, 破局]

  combo_bonus:
    consecutive: 0.2
    setup_explosion: 0.3
    contrast: 0.2
    stacking: 0.1

# ==================== Strand 权重 ====================
strand_weights:
  quest: 45
  fire: 30
  constellation: 25

# ==================== 特殊约束 ====================
constraints:
  - id: HISTB-001
    description: "架空设定要自洽"
    mandatory: true
    checkpoint: 世界观

# ==================== 读者期待 ====================
reader_expectations:
  must_satisfy:
    - "架空设定要自洽"
    - "历史感要有，但可以创新"
    - "语言风格要有古典韵味"

  optional_satisfy:
    - "穿越者带来的现代知识优势"
    - "改变历史的爽感"
    - "架空王朝的创意设定"

  never_violate:
    - "对话过于现代化，破坏历史氛围"
    - "文言文使用过度，影响阅读流畅性"
    - "人物对话千篇一律，缺乏个性"

# ==================== 禁忌清单 ====================
taboos:
  - id: TABOO-001
    content: "架空设定前后矛盾"
    severity: critical
    checkpoint: "世界观"

  - id: TABOO-002
    content: "对话过于现代化破坏历史氛围"
    severity: warning
    checkpoint: "人物对话"

  - id: TABOO-003
    content: "文言文使用过度影响阅读"
    severity: warning
    checkpoint: "语言风格"

  - id: TABOO-004
    content: "女性角色过于弱势缺乏主体性"
    severity: warning
    checkpoint: "女性角色"

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 0.9
  consistency: 1.3
  pacing: 1.0
  ooc: 1.1
  continuity: 1.1
  reader-pull: 1.0

# ==================== 对话模板库 ====================
dialogue_templates:
  styles:
    classical_elegant: 古风雅致，用词典雅，句式工整，适当使用文言词汇
    alternate_style: 古今结合，易懂但有历史感，根据设定灵活调整
    time_travel_modern: 穿越者保留现代思维，与古代人物形成认知差异

  typical_dialogues:
    court_confrontation: |
      "王大人此言差矣。"林墨上前一步，拱手道，"臣以为，边关之事，不可轻举妄动。"
      "哦？林大人有何高见？"王大人冷笑，"莫非是想包庇那个废物将军？"
      "非也。"林墨不卑不亢，"臣只是认为，用兵之道，在于知己知彼。贸然出兵，恐有后患。"
      "哼，书生之见！"
      "王大人此言，"林墨笑了笑，目光锐利如刀，"恐怕才是真正的误国之论。"
      满朝寂静，所有人的目光都聚焦在这位年轻的官员身上。

    time_traveler_monologue: |
      （内心独白）
      站在金銮殿上，看着下面跪了一地的大臣，我只想说——
      这是什么鬼展开？！
      我堂堂二十一世纪的社畜，睡了一觉就穿越成了皇帝？
      而且还是个傀儡皇帝？
      旁边那个权倾朝野的大将军正盯着我，眼神里写满了"你最好乖乖听话"。
      我深吸一口气，表面上维持着帝王威仪，内心却在疯狂翻阅记忆中的历史课本。
      好吧，既然来了，那我就——
      把这个朝代，玩个底朝天！

    palace_intrigue: |
      "姐姐今日的这身打扮，真是……别致呢。"对方的声音娇柔，却暗藏锋芒。
      林婉儿抬眼，看见她刻意选择的与自己相似的衣饰，心中了然。
      "妹妹过奖。"她浅浅一笑，"只是不知妹妹这身……可是在模仿姐姐？"
      对方脸色微变，随即恢复如常："姐姐说笑了，妹妹只是觉得这颜色好看罢了。"
      "是吗？"林婉儿走近两步，压低声音，"可惜，有些东西，是模仿不来的。"
      她转身离去，留下身后一片沉默。

  avoid_patterns:
    - 对话过于现代化，破坏历史氛围
    - 文言文使用过度，影响阅读流畅性
    - 人物对话千篇一律，缺乏个性
    - 女性角色过于弱势，缺乏主体性

# ==================== 场景描写库 ====================
scene_descriptions:
  palace_scene:
    throne_hall: |
      金銮殿内，龙椅高悬。
      文武百官分列两旁，每一道目光都落在站在大殿中央的年轻官员身上。
      "臣以为，"林墨的声音在空旷的大殿中回响，"此事需三思而后行。"
      他身着青色官袍，腰系玉带，身姿挺拔如松。
      龙椅之上，年轻的皇帝眯起眼睛，目光中闪过一丝不易察觉的欣赏。

    harem_intrigue: |
      御花园中，繁花似锦。
      林婉儿缓步走在花径上，身后跟着两名宫女。她的目光掠过前方凉亭中那个熟悉的身影——
      是她。
      新晋的贵人，皇上面前的新宠。

  battlefield_scene:
    armies_facing: |
      战鼓声震天，旌旗猎猎。
      两军对垒，中间是一片空旷的原野。
      林墨策马立于阵前，目光扫过对面的敌军——黑压压的一片，足有十万之众。
      "将军，"身旁的副将紧张道，"敌军人数众多，我们……"
      "怕什么？"林墨笑了笑，从腰间拔出佩剑，剑锋在阳光下闪着寒光，"兵不在多，在于将。"

    siege: |
      夜幕下，城墙上的火把映照出一片森严。
      守城的将士们严阵以待，目光紧盯着城下的黑暗。
      "他们什么时候动手？"一个士兵低声问道。
      "不知道……"
      话音未落，一声巨响打破了夜的寂静——
      "轰！"
      城门被撞开，无数黑影从黑暗中涌出，如潮水般冲向城门。

  time_travel_scene:
    awakening: |
      "王爷，王爷您终于醒了！"
      一个急切的声音将我从黑暗中唤醒。
      我睁开眼，看到的是一片陌生的景象——古色古香的床榻，帷幔低垂，还有……一个穿着古装的男人正满脸焦急地看着我。
      "王爷？"我皱眉，"你叫我什么？"
      那个男人愣了一下："王爷，您是摄政王啊，您不记得了吗？"
      摄政王？
      我猛地坐起来，低头看着自己——一身华丽的锦袍，腰间系着玉带，这……这分明是古装！

    modern_knowledge: |
      "大人，今年的旱灾……"
      林墨看着面前焦头烂额的县令，心中暗想：来了，穿越者大展身手的时候到了。
      他清了清嗓子，装作一副深思熟虑的样子："旱灾之事，本官已有对策。"
      "还请大人明示！"
      林墨站起身，走到窗前，背对着县令，嘴角上扬：
      "本官……有一法，或可解决燃眉之急。"
      他转过身，目光灼灼，"那就是——打井。"

# ==================== 节奏模板 ====================
pacing_templates:
  single_chapter_curve:
    court_intrigue: "朝堂铺垫30% → 矛盾激化25% → 智斗高潮30% → 后续影响15%"
    war_scene: "战前准备20% → 开战激战50% → 胜负分晓20% → 余波影响10%"
    harem: "日常铺垫25% → 暗流涌动25% → 正面交锋35% → 胜负已定15%"

  typical_examples:
    court_chapter: |
      开场(15%): 朝堂氛围描写，引出今日议题
      铺垫(15%): 各方势力表态，矛盾初现
      激化(25%): 正面交锋，言辞犀利
      高潮(30%): 主角力挽狂澜或一锤定音
      收尾(15%): 皇帝决断，各方反应，埋下后续伏笔

# ==================== 开篇模板 ====================
opening_templates:
  hook_types:
    time_travel: 现代人穿越到历史时期，带着现代知识开启新人生
    rebirth: 重生到历史时期或架空世界，带着前世记忆改变命运
    alternate_emperor: 架空世界，从帝王或权臣视角展开
    war_opening: 从战争场景切入，立即展现主角的才能

  classic_examples:
    time_travel_style: |
      我不知道自己是怎么来到这个世界的。
      只记得在自家沙发上刷历史剧，刷着刷着就睡着了，再醒来——
      就在这张古色古香的床上，身上盖着绣着龙的锦被。
      "王爷，您终于醒了！"一个跪在地上的太监激动得泪流满面，"皇上已经下了三道旨意，要王爷速速进宫！"
      王爷？我？
      我试图坐起来，却感到一阵剧烈的头痛——无数陌生的记忆如潮水般涌入脑海。
      我叫林墨，是大晋朝的摄政王，权倾朝野，一人之下万人之上。

    rebirth_style: |
      鲜血染红了金銮殿的地面。
      林婉儿躺在血泊中，看着那个曾经深爱、现在却亲手将她推入深渊的男人，嘴角浮起一丝苦涩的笑。
      "若有来世……"她用尽最后的力气，一字一顿，"我定要——让你付出代价！"
      ……
      "小姐？小姐您怎么了？"
      林婉儿猛地睁开眼，看到的是熟悉的丫鬟小翠，那是一张年轻的、充满担忧的脸。
      她低头看着自己的手——纤细、白皙，没有血迹。
      她环顾四周——这是她少女时期的闺房，窗外的梅花正开得灿烂。
      梅花……腊月……
      这是五年前！
      她重生了！