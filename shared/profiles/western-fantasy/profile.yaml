# 西幻题材Profile

name: "西幻"
version: "3.0"
template: templates/genres/西幻.md

# ==================== 推进阻力与代价 ====================
progression_constraints:
  resistance_rule: "关键推进必须遭遇真实阻力，不能自动到账。"
  cost_rule: "重要收益应伴随可见代价、暴露或资源损耗。"
  partial_payoff_rule: "阶段胜利以局部收益为主，不宜一次打穿主线矛盾。"
  residual_risk_rule: "每次推进后都应保留残留风险，避免章节收口过满。"


# ==================== 流派细分定义 ====================
sub_genres:
  骑士魔法流:
    description: "传统西幻，骑士、魔法、龙"
    core_points: ["骑士精神", "魔法战斗", "屠龙冒险"]
    pacing: "史诗冒险型"
    examples: "《亵渎》《恶魔法则》"
  异界领主流:
    description: "穿越成为贵族，发展领地"
    core_points: ["领地建设", "科技碾压", "争霸天下"]
    pacing: "经营争霸型"
    examples: "《放开那个女巫》"
  D&D规则流:
    description: "遵循D&D规则，职业分明"
    core_points: ["职业成长", "地下城探险", "装备收集"]
    pacing: "成长冒险型"
    examples: "《深渊主宰》"
  黑暗奇幻流:
    description: "压抑黑暗，道德灰色"
    core_points: ["黑暗力量", "反英雄", "打破规则"]
    pacing: "压抑爆发型"
    examples: "《巫师》"

# ==================== 节奏参数 ====================
pacing:
  type: 史诗冒险型
  tension_ratio: "3:7"
  typical_chapter_length: 5000
  word_count_range:
    min: 4000        # v4.0: 最低字数要求提升
    standard: 4500-6000
    long: 6000-8000

# ==================== 爽点配置 ====================
cool_points:
  density_required: 0.9/千字
  max_interval: 1500字

  preferred_types:
    - type: 魔法战斗
      weight: 1.6
      description: "华丽的魔法对决"
      trigger_words: [魔法, 禁咒, 法术, 元素, 召唤, 结界, 吟唱, 火球, 冰霜]
    - type: 领地发展
      weight: 1.5
      description: "领地从小村庄发展为王国"
      trigger_words: [领地, 发展, 建设, 城堡, 人口, 繁荣, 扩张, 领主]
    - type: 击败巨兽
      weight: 1.4
      description: "击败龙、恶魔等强大生物"
      trigger_words: [巨龙, 屠龙, 恶魔, 巨兽, 击败, 斩杀, 史诗, 传奇]
    - type: 贵族逆袭
      weight: 1.3
      description: "从底层崛起成为贵族"
      trigger_words: [贵族, 爵位, 封地, 逆袭, 崛起, 伯爵, 公爵, 身份]
    - type: 科技碾压
      weight: 1.2
      description: "用现代知识改变世界"
      trigger_words: [科技, 火药, 机械, 改良, 颠覆, 新发明, 震惊, 革命]

  avoid_types:
    - type: 力量无限制
      weight: 0.3
      reason: "西幻讲究规则和代价"

  # 组合加成配置
  combo_bonus:
    consecutive: 0.2       # 连续多个爽点叠加
    buildup_burst: 0.3     # 铺垫 > 500 字后爆发爽点
    contrast: 0.2       # 前后状态形成强烈对比
    multi_stack: 0.1       # 每层加成，上限+0.3

# ==================== Strand权重 ====================
strand_weights:
  quest: 0.50        # 冒险成长
  fire: 0.30         # 战斗爆发
  constellation: 0.20 # 世界观铺垫

# ==================== 特殊约束 ====================
special_constraints:
  - ID: FANT-001
    description: "魔法要有规则和代价"
    enforced: true
    check_point: 魔法使用
  - ID: FANT-002
    description: "世界观要自洽（种族、宗教、政治）"
    enforced: true
    check_point: 世界观描述
  - ID: FANT-003
    description: "贵族体系要符合中世纪逻辑"
    enforced: false
    check_point: 政治描写

platform_positioning:
  fanqie:
    primary_bucket: "西幻"
    strong_tags: ["魔法冒险", "领地成长"]
    narrative_modes: ["多主题副本"]
    tone_guardrails: ["魔法规则必须有代价", "世界观体系不能自相矛盾"]
    package_cues:
      - "首屏点异界设定或魔法危机"
      - "前三章要出现一次魔法/领地兑现"

# ==================== 黄金三章 ====================
黄金三章:
  第一章:
    opening: 穿越到异界/进入冒险
    core: 建立世界观和主角定位
    conflict: 第一次面对危险
    钩子: 获得金手指/机缘
    word_count: 4000-5000

  第二章:
    development: 开始冒险/领地建设
    试探: 展示能力
    成长: 获得初步认可
    钩子: 更大的挑战到来
    word_count: 4500-5500

  第三章:
    高潮: 解决第一个大事件
    world_view: 展示更广阔的世界
    收获: 获得核心能力/地位
    钩子: 新的征程开始
    word_count: 4500-5500

# ==================== 读者期待管理 ====================
reader_expectations:
  must_satisfy:
    - "魔法/异能体系要有规则和代价"
    - "世界观要自洽（种族、宗教、政治）"
    - "主角成长要有合理逻辑"
    - "史诗感和宏大叙事"
  optional_satisfy:
    - "传统西幻元素（龙、精灵、矮人等）"
    - "领地建设/争霸天下线"
    - "骑士精神或反英雄设定"
  must_not:
    - "力量无限制膨胀"
    - "世界观设定前后矛盾"
    - "过于现代的网络用语"

# ==================== 禁忌清单 ====================
taboos:
  - ID: TABOO-001
    content: "魔法力量无代价无限制使用"
    severity: "critical"
    check_point: "魔法使用描写"
  - ID: TABOO-002
    content: "世界观设定前后矛盾"
    severity: "critical"
    check_point: "世界观描述"
  - ID: TABOO-003
    content: "贵族体系不符合中世纪逻辑"
    severity: "warning"
    check_point: "政治描写"
  - ID: TABOO-004
    content: "现代网络用语出现在对话中"
    severity: "warning"
    check_point: "人物对话"

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 1.0
  consistency: 1.3      # 世界观一致性重要
  pacing: 1.0
  ooc: 1.0
  continuity: 1.1
  reader-pull: 1.0

# ==================== 写作风格提示 ====================
writing_style:
  anti_ai_style:
    reference: references/writing/anti-ai-style.md
    core: [删除"淡淡的/微微/不禁", 展示代替说明, 打破三段式]

  dialogue:
    风格: "西式翻译腔/中世纪风格"
    description: "符合时代背景"
    避免: ["现代网络用语"]

  description_style:
    world: "史诗感，宏大叙事"
    战斗: "魔法华丽，场面宏大"
    政治: "权谋博弈，利益交换"

# ==================== 实体标签 ====================
entity_tags:
  魔法: <entity type="魔法" name="魔法名" desc="效果" tier="等级" cost="代价"/>
  种族: <entity type="种族" name="种族名" desc="特点" tier="实力" homeland="领地"/>
  贵族: <entity type="贵族" name="爵位/名字" desc="势力" tier="等级" land="封地"/>
  giant_beast: <entity type="巨兽" name="巨兽名" desc="特点" tier="等级" weakness="弱点"/>

# ==================== 对话模板库（v3.0 新增）====================
dialogue_templates:
  style_definitions:
    西式翻译腔: "带有中世纪风格的优雅表达"
    贵族风范: "注重礼仪和身份的表达"
  typical_dialogue:
    贵族交锋: |
      "阁下的提议很有趣，但我更想知道——您能为我带来什么？"
      "一个王国。您觉得，够吗？"
    骑士宣誓: |
      "以骑士之名，我发誓守护这片土地，直至最后一滴血流尽。"
      "你的誓言，会被铭记。"
    魔法施放: |
      "古老的精灵语从他口中吟唱，周围的空气开始扭曲、凝聚。
      '以深渊的名义——禁咒，陨星坠落！'"
    dragon_dialogue: |
      "渺小的人类，你竟敢踏入我的领地？"
      "伟大的龙族，我带来一个交易——不是我的生命，而是一个更大的猎物。"
  avoid_patterns:
    - "现代网络用语"
    - "不符合中世纪背景的表达"

# ==================== 场景描写库（v3.0 新增）====================
scene_description:
  magic_combat:
    spell_duel: |
      "两道光芒在空中碰撞，激起的能量涟漪让方圆百米的树木尽皆折断。魔法师双手结印，吟唱的咒语越来越快，越来越响亮。"
    forbidden_spell_release: |
      "天空被撕裂出一道巨大的裂缝，炽热的光芒倾泻而下。那不是普通的魔法，而是足以改变战局的禁咒——代价是施法者的一半魔力。"
  territory_construction:
    castle_construction: |
      "石块一块块垒起，工人们昼夜不停地工作着。三个月后，一座崭新的城堡将在这里崛起——他统治这片土地的根基。"
    technology_intro: |
      "他画出的图纸让工匠们目瞪口呆。水车、织布机、冶炼炉……这些看似简单的机器，将彻底改变这个落后的领地。"
  race_scenes:
    elf_forest: |
      "参天的古木遮蔽了阳光，空气中弥漫着奇异的芬芳。精灵们的身影在树冠间穿梭，警惕地注视着这个闯入的人类。"
    dwarf_forge: |
      "熔炉的火焰映红了整个大厅，矮人们挥舞着铁锤，叮叮当当的敲击声不绝于耳。这里出产的武器，是整个大陆最精良的。"

# ==================== 节奏模板（v3.0 新增）====================
pacing_templates:
  chapter_emotion_curve:
    adventure_type: "出发(20%) → 探索(30%) → 遭遇(30%) → 战斗/解决(20%)"
    construction_type: "规划(25%) → 建设(35%) → 成果展示(30%) → 新目标(10%)"
    combat_type: "对峙(20%) → 战斗(40%) → 高潮(30%) → 战后(10%)"
  typical_pacing_example:
    lord_construction_chapter: "发现问题 → 提出解决方案 → 实施过程 → 成果展示 + 新挑战出现"

# ==================== 开篇模板（v3.0 新增）====================
opening_templates:
  hook_types:
    time_travel_noble: "穿越成落魄贵族，开始逆袭"
    adventure_start: "踏上冒险旅程"
    kingdom_crisis: "国家危难，英雄崛起"
  classic_opening_examples:
    lord_travel_type: |
      "当艾德蒙睁开眼时，发现自己正躺在一间破旧的石屋中。
      '少爷，您终于醒了！'一个苍老的声音传来。
      脑海中陌生的记忆涌入——他穿越了，成了一个亡国贵族的后裔，除了这个破败的城堡，一无所有。
      但他知道，这只是开始。"
    adventure_start: |
      "马车缓缓驶出王都，年轻的骑士回头看了一眼繁华的城市。
      '再见了，安逸的生活。'他轻声说。
      前方，是未知的冒险和命运。"
