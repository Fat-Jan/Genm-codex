# 职场婚恋题材Profile

name: "职场婚恋"
version: "3.0"
template: templates/genres/职场婚恋.md

# ==================== 推进阻力与代价 ====================
progression_constraints:
  resistance_rule: "关键推进必须遭遇真实阻力，不能自动到账。"
  cost_rule: "重要收益应伴随可见代价、暴露或资源损耗。"
  partial_payoff_rule: "阶段胜利以局部收益为主，不宜一次打穿主线矛盾。"
  residual_risk_rule: "每次推进后都应保留残留风险，避免章节收口过满。"


sub_genres:
  promotion_arc:
    description: "职场升职加薪"
    core_points: ["升职加薪", "职场成功", "人生赢家"]
    pacing: "奋斗型"
  romance_arc:
    description: "婚姻与爱情"
    core_points: ["感情圆满", "婚姻幸福", "家庭和睦"]
    pacing: "情感型"
  contract_marriage_arc:
    description: "先结婚后恋爱"
    core_points: ["日久生情", "先婚后爱", "修成正果"]
    pacing: "言情型"

pacing:
  type: 情感驱动型
  tension_ratio: "5:5"
  typical_chapter_length: 4500
  word_count_range:
    min: 4000        # v4.0: 最低字数要求提升
    standard: 4000-5500
    long: 5500-7000

# ==================== 爽点配置 ====================
# 爽点评分系统 v2.0 - 加权智能计算
#
# 基础公式: 加权爽点密度 = Σ(爽点权重) / (字数/1000)
#
# 权重配置说明:
#   - 权重范围: 0.0-2.0，推荐范围 0.8-1.5
#   - 默认权重: 升职爽(1.5), 感情爽(1.4), 家庭爽(1.3), 打脸爽(1.2)
#   - 组合加成: 连续爽点(+0.2), 铺垫后爆发(+0.3), 对比反差(+0.2), 多重叠加(+0.1/层)
#
# 平台标准(2026):
#   七猫: 1.3-1.8/千字  番茄: 1.2-1.5/千字  起点: 0.8-1.0/千字  晋江: 1.0/千字
#
cool_points:
  density_required: 0.7/千字
  max_interval: 2000字    # 超过此值需预警

  # 权重类型配置 - 定义本题材的爽点偏好
  # 权重越高，该类型爽点对总评分的贡献越大
  preferred_types:
    - type: 升职加薪
      weight: 1.5
      description: "职场晋升、能力被认可"
      trigger_words: [升职, 晋升, 加薪, 升迁, 提拔, 任命, 恭喜, 负责, 管理]
    - type: 感情圆满
      weight: 1.4
      description: "感情进展顺利，关系确立或深化"
      trigger_words: [告白, 在一起, 表白, 答应, 恋爱, 结婚, 领证, 求婚]
    - type: 家庭和睦
      weight: 1.3
      description: "家庭关系和谐，矛盾化解"
      trigger_words: [和睦, 团聚, 和解, 原谅, 理解, 支持, 温馨]
    - type: 职场打脸
      weight: 1.2
      description: "能力展示，让轻视者刮目相看"
      trigger_words: [方案, 成功, 搞定, 震惊, 没想到, 能力, 真厉害]

  # 避免类型 - 权重0表示完全避免，低权重表示效果打折
  avoid_types:
    - type: 职场悬浮
      weight: 0
      reason: 职场描写要真实可信
    - type: 感情事业割裂
      weight: 0.3
      reason: 双线要有联系和互动

  # 组合加成配置
  combo_bonus:
    consecutive_satisfaction: 0.2       # 警告: 可能导致阈值过高，谨慎使用
    buildup_explosion: 0.3     # 铺垫 > 500 字后爆发爽点
    contrast_effect: 0.2       # 前后状态形成强烈对比
    multi_stack: 0.1       # 每层加成，上限+0.3

strand_weights:
  quest: 0.35
  fire: 0.30
  constellation: 0.35

# ==================== 读者期待管理 ====================
reader_expectations:
  must_satisfy:
    - "职场描写要真实"
    - "感情线与事业线要有联系"
    - "角色能力与职位要匹配"
  optional_satisfy:
    - "先婚后爱的反差萌"
    - "职场升职的爽感"
    - "办公室暧昧的甜度"
  must_not:
    - "职场描写过于悬浮"
    - "感情线与事业线完全割裂"
    - "角色能力与职位不匹配"

# ==================== 平台定位 ====================
platform_positioning:
  fanqie:
    primary_bucket: "职场婚恋"
    strong_tags: ["先婚后爱", "办公室暧昧"]
    narrative_modes: ["双线并进"]
    tone_guardrails: ["职场不能悬浮", "感情线与事业线不能割裂"]
    package_cues:
      - "首屏点关系绑定"
      - "工作困局与情感冲突同场出现"

# ==================== 禁忌清单 ====================
taboos:
  - ID: TABOO-001
    content: "职场描写过于悬浮不真实"
    severity: "critical"
    check_point: "职场描写"
  - ID: TABOO-002
    content: "感情线与事业线完全割裂"
    severity: "warning"
    check_point: "双线设计"
  - ID: TABOO-003
    content: "角色能力与职位不匹配"
    severity: "warning"
    check_point: "人物塑造"

checker_weights:
  high-point: 0.8
  consistency: 1.1
  pacing: 1.0
  ooc: 1.0
  continuity: 1.0
  reader-pull: 1.1

# ==================== 参考扩展文件 ====================
reference_files:
  - reference-notes.md
