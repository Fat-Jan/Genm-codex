# 都市脑洞题材Profile

name: "都市脑洞"
version: "3.0"
template: templates/genres/都市脑洞.md

# ==================== 推进阻力与代价 ====================
progression_constraints:
  resistance_rule: "关键推进必须遭遇真实阻力，不能自动到账。"
  cost_rule: "重要收益应伴随可见代价、暴露或资源损耗。"
  partial_payoff_rule: "阶段胜利以局部收益为主，不宜一次打穿主线矛盾。"
  residual_risk_rule: "每次推进后都应保留残留风险，避免章节收口过满。"


# ==================== 流派细分定义 ====================
sub_genres:
  urban_superpower:
    description: "都市背景+异能设定"
    core_points: ["异能觉醒", "碾压凡人", "守护城市"]
    pacing: "爽文型"
    examples: "《全球高武》"
  urban_rebirth:
    description: "重生回都市过去"
    core_points: ["先知先觉", "弥补遗憾", "人生赢家"]
    pacing: "逆袭型"
    examples: "《重生之财源滚滚》"
  urban_system:
    description: "都市背景+系统金手指"
    core_points: ["系统辅助", "快速成长", "碾压对手"]
    pacing: "爽文型"
    examples: "《都市之最强系统》"
  urban_tycoon:
    description: "都市背景+无限金钱"
    core_points: ["挥金如土", "打脸势利眼", "享受人生"]
    pacing: "爽文型"
    examples: "《都市之神豪系统》"

# ==================== 节奏参数 ====================
pacing:
  type: 快节奏爽文
  tension_ratio: "2:8"
  typical_chapter_length: 4500
  word_count_range:
    min: 4000        # v4.0: 最低字数要求提升
    standard: 4000-5500
    long: 5500-7000

# ==================== 爽点配置 ====================
# 爽点评分系统 v2.0 - 加权智能计算
#
# 基础公式: 加权爽点密度 = Σ(爽点权重) / (字数/1000)
#
# 权重配置说明:
#   - 权重范围: 0.0-2.0，推荐范围 0.8-1.8
#   - 默认权重: 打脸碾压(1.8), 金钱炫耀(1.6), 异能展示(1.5), 人生逆袭(1.4)
#   - 组合加成: 连续爽点(+0.2), 铺垫后爆发(+0.3), 对比反差(+0.2), 多重叠加(+0.1/层)
#
# 平台标准(2026):
#   七猫: 1.3-1.8/千字  番茄: 1.2-1.5/千字  起点: 0.8-1.0/千字  晋江: 1.0/千字
#
cool_points:
  density_required: 1.3/千字
  max_interval: 800字     # 都市脑洞爽文节奏极快

  # 权重类型配置 - 定义本题材的爽点偏好
  # 权重越高，该类型爽点对总评分的贡献越大
  preferred_types:
    - type: 打脸碾压
      weight: 1.8
      description: "彻底碾压对手，打脸效果极强"
      trigger_words: [碾压, 秒杀, 不堪一击, 碾压, 轻松, 垃圾, 不值一提, 找死]
    - type: 金钱炫耀
      weight: 1.6
      description: "展示财富实力，金钱压制"
      trigger_words: [一个亿, 黑卡, 买下, 不差钱, 随便刷, 刷卡, 转账, 富豪]
    - type: 异能展示
      weight: 1.5
      description: "展示异能或金手指能力"
      trigger_words: [异能, 觉醒, 系统, 金手指, 能力, 超能力, 变身]
    - type: 人生逆袭
      weight: 1.4
      description: "从底层逆袭成为人生赢家"
      trigger_words: [逆袭, 翻身, 重生, 改变, 赢家, 成功, 巅峰]

  # 避免类型 - 权重0表示完全避免，低权重表示效果打折
  avoid_types:
    - type: 金手指矛盾
      weight: 0
      reason: 金手指设定必须自洽
    - type: 节奏拖沓
      weight: 0
      reason: 都市脑洞节奏必须快

  # 组合加成配置
  combo_bonus:
    consecutive_points: 0.2       # 警告: 可能导致阈值过高，谨慎使用
    buildup_burst: 0.3     # 铺垫 > 500 字后爆发爽点
    contrast_effect: 0.2       # 前后状态形成强烈对比
    multi_stack: 0.1       # 每层加成，上限+0.3

# ==================== Strand权重 ====================
strand_weights:
  quest: 0.50
  fire: 0.35
  constellation: 0.15

# ==================== 读者期待管理 ====================
reader_expectations:
  must_satisfy:
    - "金手指/异能设定要自洽"
    - "打脸要有爽感"
    - "节奏要快，不能拖沓"
  optional_satisfy:
    - "重生/系统带来的逆袭快感"
    - "金钱炫耀的爽感"
    - "异能展示的震撼"
  must_not:
    - "对话过于文绉绉，不符合都市爽文风格"
    - "反派话多但不够嚣张"
    - "主角回应太温和不够霸气"

# ==================== 禁忌清单 ====================
taboos:
  - ID: TABOO-001
    content: "金手指设定前后矛盾"
    severity: "critical"
    check_point: "设定设计"
  - ID: TABOO-002
    content: "对话风格不符合都市爽文"
    severity: "warning"
    check_point: "人物对话"
  - ID: TABOO-003
    content: "反派不够嚣张，缺乏被打脸的价值"
    severity: "warning"
    check_point: "反派塑造"
  - ID: TABOO-004
    content: "节奏拖沓，缺乏爽感"
    severity: "warning"
    check_point: "整体节奏"

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 1.4
  consistency: 1.0
  pacing: 1.1
  ooc: 1.0
  continuity: 1.0
  reader-pull: 1.0

# ==================== 平台定位 ====================
platform_positioning:
  fanqie:
    primary_bucket: "都市脑洞"
    strong_tags: ["系统", "逆袭"]
    narrative_modes: ["多主题副本"]
    tone_guardrails: ["节奏不能拖沓", "金手指不能替代逻辑"]
    package_cues:
      - "首屏点金手指或反差"
      - "前三章要有一次硬兑现"

# ==================== 参考扩展文件 ====================
reference_files:
  - reference-notes.md
