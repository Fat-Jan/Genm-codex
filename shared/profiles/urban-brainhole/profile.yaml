# 都市脑洞题材Profile

name: "都市脑洞"
version: "3.0"
template: templates/genres/都市脑洞.md

# ==================== 流派细分定义 ====================
sub_genres:
  urban_superpower:
    description: "都市背景+异能设定"
    core_points: ["异能觉醒", "碾压凡人", "守护城市"]
    pacing: "爽文型"
    examples: "《全球高武》"
  urban_rebirth:
    description: "重生回都市过去"
    core_points: ["先知先觉", "弥补遗憾", "人生赢家"]
    pacing: "逆袭型"
    examples: "《重生之财源滚滚》"
  urban_system:
    description: "都市背景+系统金手指"
    core_points: ["系统辅助", "快速成长", "碾压对手"]
    pacing: "爽文型"
    examples: "《都市之最强系统》"
  urban_tycoon:
    description: "都市背景+无限金钱"
    core_points: ["挥金如土", "打脸势利眼", "享受人生"]
    pacing: "爽文型"
    examples: "《都市之神豪系统》"

# ==================== 节奏参数 ====================
pacing:
  type: 快节奏爽文
  tension_ratio: "2:8"
  typical_chapter_length: 4500
  word_count_range:
    min: 4000        # v4.0: 最低字数要求提升
    standard: 4000-5500
    long: 5500-7000

# ==================== 爽点配置 ====================
# 爽点评分系统 v2.0 - 加权智能计算
#
# 基础公式: 加权爽点密度 = Σ(爽点权重) / (字数/1000)
#
# 权重配置说明:
#   - 权重范围: 0.0-2.0，推荐范围 0.8-1.8
#   - 默认权重: 打脸碾压(1.8), 金钱炫耀(1.6), 异能展示(1.5), 人生逆袭(1.4)
#   - 组合加成: 连续爽点(+0.2), 铺垫后爆发(+0.3), 对比反差(+0.2), 多重叠加(+0.1/层)
#
# 平台标准(2026):
#   七猫: 1.3-1.8/千字  番茄: 1.2-1.5/千字  起点: 0.8-1.0/千字  晋江: 1.0/千字
#
cool_points:
  density_required: 1.3/千字
  max_interval: 800字     # 都市脑洞爽文节奏极快

  # 权重类型配置 - 定义本题材的爽点偏好
  # 权重越高，该类型爽点对总评分的贡献越大
  preferred_types:
    - type: 打脸碾压
      weight: 1.8
      description: "彻底碾压对手，打脸效果极强"
      trigger_words: [碾压, 秒杀, 不堪一击, 碾压, 轻松, 垃圾, 不值一提, 找死]
    - type: 金钱炫耀
      weight: 1.6
      description: "展示财富实力，金钱压制"
      trigger_words: [一个亿, 黑卡, 买下, 不差钱, 随便刷, 刷卡, 转账, 富豪]
    - type: 异能展示
      weight: 1.5
      description: "展示异能或金手指能力"
      trigger_words: [异能, 觉醒, 系统, 金手指, 能力, 超能力, 变身]
    - type: 人生逆袭
      weight: 1.4
      description: "从底层逆袭成为人生赢家"
      trigger_words: [逆袭, 翻身, 重生, 改变, 赢家, 成功, 巅峰]

  # 避免类型 - 权重0表示完全避免，低权重表示效果打折
  avoid_types:
    - type: 金手指矛盾
      weight: 0
      reason: 金手指设定必须自洽
    - type: 节奏拖沓
      weight: 0
      reason: 都市脑洞节奏必须快

  # 组合加成配置
  combo_bonus:
    consecutive_points: 0.2       # 警告: 可能导致阈值过高，谨慎使用
    buildup_burst: 0.3     # 铺垫 > 500 字后爆发爽点
    contrast_effect: 0.2       # 前后状态形成强烈对比
    multi_stack: 0.1       # 每层加成，上限+0.3

# ==================== Strand权重 ====================
strand_weights:
  quest: 0.50
  fire: 0.35
  constellation: 0.15

# ==================== 读者期待管理 ====================
reader_expectations:
  must_satisfy:
    - "金手指/异能设定要自洽"
    - "打脸要有爽感"
    - "节奏要快，不能拖沓"
  optional_satisfy:
    - "重生/系统带来的逆袭快感"
    - "金钱炫耀的爽感"
    - "异能展示的震撼"
  must_not:
    - "对话过于文绉绉，不符合都市爽文风格"
    - "反派话多但不够嚣张"
    - "主角回应太温和不够霸气"

# ==================== 禁忌清单 ====================
taboos:
  - ID: TABOO-001
    content: "金手指设定前后矛盾"
    severity: "critical"
    check_point: "设定设计"
  - ID: TABOO-002
    content: "对话风格不符合都市爽文"
    severity: "warning"
    check_point: "人物对话"
  - ID: TABOO-003
    content: "反派不够嚣张，缺乏被打脸的价值"
    severity: "warning"
    check_point: "反派塑造"
  - ID: TABOO-004
    content: "节奏拖沓，缺乏爽感"
    severity: "warning"
    check_point: "整体节奏"

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 1.4
  consistency: 1.0
  pacing: 1.1
  ooc: 1.0
  continuity: 1.0
  reader-pull: 1.0

# ==================== 对话模板库（v3.0 新增）====================
dialogue_templates:
  style_definitions:
    urban_cool_style: "简洁有力，节奏明快，善用反问和嘲讽，打脸对话要犀利直接"
    superpower_display_style: "神秘感与霸气并存，适当使用专业术语，展现超凡能力时的从容"
    system_prompt_style: "机械化与人性化结合，系统通知简洁明了，互动对话带点俏皮"
  typical_dialogues:
    face_slap_scene: |
      "呦，这不是林凡吗？怎么，今天又来捡垃圾？"
      林凡淡淡扫了他一眼："垃圾桶在哪，你自己没照镜子？"
      "你！"对方脸色铁青，"你以为你是什么东西？"
      "我是东西，但不是你能惹的东西。"林凡转身，嘴角微扬，"下辈子记得带脑子出门。"
    system_activation: |
      【叮！系统激活成功！】
      【检测到宿主资质：垃圾中的战斗机】
      林凡："……能换个说法吗？"
      【不能，这叫诚实。现在，开启你的逆袭之路吧，废柴！】
      "废柴？"林凡眼中精光一闪，"走着瞧。"
    awakening: |
      "你的眼睛……怎么变成金色的了？"
      林凡缓缓睁眼，瞳孔中流转着神秘的光芒："看到的世界，不一样了。"
      "什么意思？"
      "意思就是——"他抬手，空中凝聚出一道金色纹路，"我可以改变这个世界。"
  avoid_patterns:
    - "对话过于文绉绉，不符合都市爽文风格"
    - "反派话多但不够嚣张，缺乏被打脸的价值"
    - "主角回应太温和，不够霸气"
    - "系统太死板，没有个性"

# ==================== 场景描写库（v3.0 新增）====================
scene_description:
  superpower_combat:
    city_street_battle: |
      夜幕下的霓虹灯将整条街染成诡异的紫色，林凡站在路灯下，身后的影子被拉得极长。
      对面，三个黑衣人呈扇形包围过来，每个人的手中都泛着不同颜色的光芒——火红、冰蓝、暗紫。
      "就你一个人？"领头者冷笑，"勇气可嘉。"
      林凡活动了一下脖子，发出清脆的响声："对付你们，足够了。"
      话音未落，他整个人已经消失在原地，下一秒出现在领头者面前，一拳轰出！
      空气炸裂，拳头周围的空间出现了肉眼可见的裂纹！
    system_space: |
      【欢迎进入系统空间】
      眼前是一片纯白的世界，没有天，没有地，只有无尽的虚空和悬浮在空中的金色光点。
      一个半透明的身影在面前凝聚——是系统拟人化的形象，一身白色西装，面容模糊却透着一股精英气质。
      "宿主，今天的任务很简单。"它的声音不带感情，"但奖励，会让你心动。"
      林凡看着它面前浮现的任务面板，嘴角上扬："这个，我喜欢。"
  urban_life:
    luxury_club_face_slap: |
      皇家会所，云城最顶级的私人俱乐部。
      水晶吊灯的光芒折射在每个人的昂贵的西装和礼服上，空气中弥漫着高档香水和红酒的气息。
      林凡穿着一件黑色风衣，与周围的奢靡格格不入。
      "哟，这不是林大少爷吗？怎么，今儿舍得出门了？"一个穿着阿玛尼西装的男人端着红酒走过来，嘴角的嘲讽毫不掩饰。
      "张少，好久不见。"林凡淡淡道，目光却越过他看向远处，"借过。"
      "借过？"张少伸手拦住他，"这种地方，不是谁都能进的。保安呢？怎么让乞丐混进来了？"
      周围响起窃窃私语，所有人的目光都聚集过来——有嘲讽，有幸灾乐祸，也有好奇的。
      林凡终于正眼看他，嘴角勾起一抹意味深长的弧度："你确定，该出去的是我？"
    system_shop: |
      意识海中，金色的商城界面缓缓展开。
      【系统商城 - 今日特惠】
      【异能强化液 x1 - 100积分（原价500）】
      【千金难求的透视眼 - 200积分】
      【主角光环碎片 - ？？积分】
      林凡看着最后一项的问号，皱眉："这个怎么买不了？"
      【宿主等级不足。该物品需要：成为真正的主角】
      "……"
      【加油吧，废柴】
  money_showoff:
    shopping_spree: |
      超市里，林凡推着购物车，目光扫过货架上的商品。
      "这个，这个，还有这个……"他一边念叨，一边把东西往车里扔。
      身后的导购员目瞪口呆："先生，您确定要……全部？"
      "全部。"林凡点头，然后补充道，"每样十份。"
      "十、十份？！"导购员的声音都颤抖了，"但是有些东西加起来要……"
      "钱不是问题。"林凡拿出一张黑卡，淡淡道，"有问题吗？"
      导购员看着那张足以买下半个超市的卡，喉咙发干："没、没有……"
      十分钟后，林凡看着身后排成长龙的购物车，满意地点头："这才像样。"
      导购员："……"
    auction: |
      拍卖会场灯光璀璨，前排的贵宾席上坐满了云城的名流。
      林凡坐在最后一排，百无聊赖地看着台上。
      "下一件拍品，是传说中的夜明珠，起拍价一千万！"
      "一千一百万！"
      "一千五百万！"
      "两千万！"
      价格节节攀升，现场的气氛也越来越热烈。
      林凡打了个哈欠，举牌："一个亿。"
      全场寂静。
      拍卖师愣住了，所有人转头看向他，目光中满是不可置信。
      "一个亿……一次！一个亿……两次！一个亿……三次！成交！"
      林凡站起来，轻松地走向后台："刷卡还是转账？"

# ==================== 节奏模板（v3.0 新增）====================
pacing_templates:
  chapter_emotion_curve:
    standard_cool_pacing: "开场压抑10% → 冲突铺垫20% → 矛盾激化15% → 打脸高潮40% → 余韵收尾15%"
    consecutive_face_slap_pacing: "前章铺垫30% → 本章爆发50% → 伏笔埋设20%"
    awakening_pacing: "日常生活30% → 异变开始25% → 觉醒高潮35% → 后续影响10%"
  typical_pacing_example:
    face_slap_chapter: |
      opening_10pct: 主角出场，氛围铺垫，展示主角当前处境或被轻视
      setup_20pct: 反派登场，口出狂言，制造矛盾
      escalation_15pct: 矛盾升级，围观群众反应，主角被逼到墙角
      climax_40pct: 主角反击，金手指出现或实力展示，彻底打脸
      ending_15pct: 反派傻眼，群众震惊，主角潇洒离场，埋下后续伏笔
    awakening_chapter: |
      opening_30pct: 日常场景，展示主角的普通或不甘
      incident_25pct: 意外事件发生，身体出现异常
      awakening_35pct: 异能觉醒，获得系统或能力，尝试使用
      impact_10pct: 觉醒后的变化，心理转变，新的可能

# ==================== 开篇模板（v3.0 新增）====================
opening_templates:
  hook_types:
    rebirth_opening: "主角重生回到过去，带着前世记忆和遗憾，立即给出明确的逆袭目标"
    system_activation: "主角在低谷时获得系统，金手指出现，带来巨大的爽点期待"
    awakening: "主角突然获得异能，展示非凡能力，暗示即将开启的强者之路"
    face_slap_opening: "主角被欺压到极致，随即反击，立即展示爽文风格"
  classic_opening_examples:
    rebirth_opening: |
      "林凡，你给我滚出去！"
      一声怒吼将林凡从黑暗中惊醒，他猛地睁开眼，眼前是一张熟悉的、令他厌恶至极的脸——张明，他曾经最好的兄弟，也是后来将他推向深渊的人。
      而现在，这张脸上写满了嚣张与得意。
      林凡愣住了。
      这是……五年前？他被公司开除的那一天？
      前世的屈辱、背叛、痛苦，在这一刻全部涌上心头。
      他低下头，看着自己年轻了五岁的手，嘴角缓缓勾起一抹冰冷的弧度。
      张明，还有你们所有人……
      这一次，我会把一切都拿回来。
    system_activation_opening: |
      【叮！检测到宿主正在经历人生最低谷】
      【逆袭系统启动中……10%……50%……100%】
      【系统激活成功！】
      林凡愣住了，脑子里突然出现的声音让他以为自己疯了。
      失业、被甩、被房东赶出来，今天是他的至暗时刻，怎么突然就有了系统？
      【宿主，你的人生已经跌到谷底了】
      系统的声音带着一丝欠揍的欢快，【现在，往上爬吧！】
      "……你是什么东西？"
      【我是你逆袭路上的最佳搭档，啊，对了，新手礼包要不要领取？】
      林凡深吸一口气，苦笑一声："来都来了，能不要吗？"
      这一刻，他的人生，彻底改变。
    awakening_opening: |
      林凡的世界，在今天之前，一直是灰色的。
      灰色的天空，灰色的街道，灰色的人生——找不到工作，没有女朋友，甚至连房都租不起。
      直到今天，他的世界突然有了颜色。
      事情从早晨说起。他路过一片拆迁工地，不小心踩到一块玻璃碎片。正常来说，这应该会划破他的鞋底，甚至伤到他的脚。
      但那块玻璃，在他的注视下，重新凝聚成了完整的形态。
      林凡以为自己在做梦。
      直到他把路边的落叶握在手中，看着它们在他手中缓缓恢复成翠绿的模样。
      他看着自己的手，颤抖着喃喃自语："这是……我能……逆转时间？"
      不对，不是逆转时间，是——"修复"。
      他能"修复"一切。
      林凡抬起头，看着灰蒙蒙的天空，第一次感觉到，自己的人生，或许真的有救了。
    face_slap_opening: |
      "林凡，你真以为攀上叶家就能飞上枝头变凤凰？"
      李浩站在林凡面前，脸上带着毫不掩饰的嘲讽，"也不撒泡尿照照自己，一个穷乡僻壤出来的土包子，配吗？"
      周围响起一阵哄笑，所有人的目光都聚集在林凡身上，有的嘲讽，有的幸灾乐祸，更多的是等着看好戏。
      林凡看着李浩那张嚣张的脸，脑海中闪过前世被这些人一步步逼向深渊的画面。
      这一次，不一样了。
      他想起昨天激活的系统，想起那串足以改变一切的数据。
      他淡淡道："李浩，你确定，我要配？"
      "哈？你配什么？"
      林凡嘴角上扬，眼神从慵懒变得锐利："我配——让你跪下。"
      话音刚落，李浩的双腿突然不受控制地弯曲，整个人"噗通"一声跪在了林凡面前。
      全场死寂。