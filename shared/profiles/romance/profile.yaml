# 言情题材 Profile v3.0
# 网文创作系统 - 目录化配置

name: "言情"
display_name: "言情（女频通用）"
description: "女频通用言情题材，包含甜宠、虐恋、重生、穿书等流派"
version: "3.0"

# ==================== 推进阻力与代价 ====================
progression_constraints:
  resistance_rule: "关键推进必须遭遇真实阻力，不能自动到账。"
  cost_rule: "重要收益应伴随可见代价、暴露或资源损耗。"
  partial_payoff_rule: "阶段胜利以局部收益为主，不宜一次打穿主线矛盾。"
  residual_risk_rule: "每次推进后都应保留残留风险，避免章节收口过满。"


# ==================== 流派细分定义 ====================
sub_genres:
  sweet:
    name: "甜宠流"
    description: "全程高甜，男主宠溺"
    core_points: [甜蜜互动, 守护宠爱, 身份反差萌]
    pacing: relaxed
    examples: [致我们单纯的小美好, 微微一笑很倾城]

  angst:
    name: "虐恋流"
    description: "虐心情节多，情感波折大"
    core_points: [虐后更甜, 误会解除, 追妻火葬场]
    pacing: intense
    examples: [千山暮雪, 华胥引]

  rebirth:
    name: "重生逆袭流"
    description: "重生改变命运，逆袭复仇"
    core_points: [先知先觉, 打脸复仇, 改变命运]
    pacing: shuangwen
    examples: [重生之豪门宠妻, 重生之嫡女祸妃]

  transmigration:
    name: "穿书穿流派"
    description: "穿越到小说世界，改变剧情"
    core_points: [熟知剧情, 改变人设, 攻略男主]
    pacing: anti_trope
    examples: [穿成反派的白月光, 穿书之自救攻略]

# ==================== 节奏参数 ====================
pacing:
  type: 情感驱动
  tension_ratio: "4:6"
  typical_chapter_length: 4500
  word_count:
    minimum: 4000
    standard: 4000-5500
    long: 5500-7000

# ==================== 爽点配置 ====================
cool_points:
  density: 1.0
  max_interval: 1200

  preferred_types:
    - type: 甜蜜超预期
      weight: 1.5
      description: "意外惊喜，情感升温"
      triggers: [甜蜜, 宠溺, 心动, 脸红, 心跳, 温柔, 抱抱, 亲亲, 眼神]

    - type: 误会解除
      weight: 1.3
      description: "误解消除，真相大白"
      triggers: [误会, 真相, 解释, 原来是这样, 我错了, 相信, 信任]

    - type: 保护爽
      weight: 1.2
      description: "男主保护女主"
      triggers: [保护, 守护, 挡住, 挺身而出, 谁敢, 我的女人, 不许欺负]

    - type: 身份反转
      weight: 1.1
      description: "真实身份揭露"
      triggers: [身份, 真正, 原来, 竟然是, 没想到, 震惊, 嫡女, 豪门]

    - type: 逆袭爽
      weight: 1.0
      description: "从困境到幸福"
      triggers: [逆袭, 翻身, 打脸, 反击, 不再, 改变, 崛起, 报复]

  avoid_types:
    - type: 无铺垫虐心
      weight: 0.3
      reason: 虐心需有铺垫
    - type: 男主渣行为无后果
      weight: 0
      reason: 渣行为必须有后果

  combo_bonus:
    consecutive: 0.2
    setup_explosion: 0.3
    contrast: 0.2
    stacking: 0.1

# ==================== Strand 权重 ====================
strand_weights:
  quest: 35
  fire: 40
  constellation: 25

  warnings:
    quest_max_consecutive: 3
    fire_missing_max: 3
    constellation_missing_max: 15

# ==================== 特殊约束 ====================
constraints:
  - id: ROMANCE-001
    description: "男主必须在前3章出场或强烈暗示"
    mandatory: true
    checkpoint: 前3章

  - id: ROMANCE-002
    description: "情感发展需有铺垫，不可突兀"
    mandatory: true
    checkpoint: 情感升温场景

  - id: ROMANCE-003
    description: "女主不能无底线原谅"
    mandatory: true
    checkpoint: 冲突解决

  - id: ROMANCE-004
    description: "男主行为需符合人设"
    mandatory: true
    checkpoint: 男主出场

# ==================== 黄金三章 ====================
golden_three:
  chapter_1:
    opening: 情感冲击/身份危机
    core: 女主困境展示
    hint: 男主即将出场
    hook: 命运即将改变
    word_count: 4000-5000

  chapter_2:
    expansion: 男女主首次重要互动
    conflict: 身份或地位冲突
    progress: 情感或利益纠葛开始
    hook: 情感悬念或危机
    word_count: 4000-5500

  chapter_3:
    climax: 情感小高潮或身份变化
    worldbuilding: 更复杂的情感世界
    hook: 强情感悬念或期待
    word_count: 4000-5500

# ==================== 检查器权重 ====================
checker_weights:
  high-point: 1.0
  consistency: 1.0
  pacing: 1.0
  ooc: 1.3
  continuity: 1.1
  reader-pull: 1.2

# ==================== 写作风格 ====================
writing_style:
  anti_ai_style:
    reference: references/writing/anti-ai-style.md
    core: [删除"淡淡的/微微/不禁", 展示代替说明, 打破三段式]

  dialogue:
    style: 甜美/细腻
    characteristics: 符合角色身份，有感情张力
    avoid: [过于直白, 缺乏情感]

  description: "emotion: 细腻，注重心理描写"
    scene: 浪漫氛围营造
    appearance: 适度，不过度

  pacing_notes:
    buildup: 情感铺垫充分
    climax: 情感爆发点
    transition: 允许日常过渡

# ==================== 子流派适配 ====================
sub_genre_adaptation:
  sweet:
    angst_level: low
    cool_point_weight: 甜蜜超预期 1.8
    pacing: 轻松明快

  angst:
    angst_level: high
    cool_point_weight: 误会解除 1.5
    pacing: 起伏大

  rebirth:
    key_elements: [前世记忆, 改变命运]
    cool_point_weight: 逆袭爽 1.3

  transmigration:
    key_elements: [熟知剧情, 改变命运]
    cool_point_weight: 身份反转 1.3

# ==================== 实体标签 ====================
entity_tags:
  character: <entity type="角色" name="角色名" role="身份" relation="与女主关系"/>
  setting: <entity type="场景" name="场景名" desc="特点" mood="氛围"/>
  item: <entity type="物品" name="物品名" desc="意义" owner="归属"/>

platform_positioning:
  fanqie:
    primary_bucket: "青春甜宠"
    strong_tags: ["高甜", "情感拉扯"]
    narrative_modes: ["双线并进"]
    tone_guardrails: ["甜感不能空转", "误会不能纯靠不沟通"]
    package_cues:
      - "首屏点心动或情感危机"
      - "前三章要有一次关系推进"

reference_files:
  - reference-notes.md

# ==================== 悬念规划 ====================
suspense_planning:
  importance: B

  types:
    short_term:
      definition: 单个情感事件内的悬念，事件结束时解决
      reveal_timing: 事件内（1-5章）
      examples: [误会的真相, 小人的阴谋, 礼物的含义]

    mid_term:
      definition: 跨越多个情感阶段的悬念，与感情发展相关
      reveal_timing: 10-40章
      examples: [男主真实身份, 男主过去的感情, 女主身世]

    long_term:
      definition: 贯穿全书的核心悬念，最终HE/真相
      reveal_timing: 40-100章，核心反转建议60章后
      examples: [男女主最终命运, 核心矛盾解决, 所有误会澄清]

  reveal_timing:
    chapter_1_to_3:
      - type: 男主出场
        content: 男主必须在前3章出场或强烈暗示
        mandatory: true
      - type: 核心困境展示
        content: 女主的困境/目标
        mandatory: true

    chapter_3_to_10:
      - type: 情感初步升温
        content: 男女主有互动，关系萌芽
        note: 言情的感情线发展较快
      - type: 第一次误会
        content: 建立情感冲突，为后续铺垫

    chapter_10_to_25:
      - type: 男主身份暗示
        content: 暗示男主不简单，但保持神秘
      - type: 感情确认
        content: 男女主确立关系（甜宠流更早，虐恋流可能更晚）

    chapter_25_to_50:
      - type: 男主真实身份揭露
        content: 男主不为人知的身份/背景
        note: 这是言情的重要爽点，要有铺垫
      - type: 重要误会解除
        content: 影响感情的关键误会
      - type: 女主身世线索
        content: 女主隐藏的身份或背景

    chapter_50_to_80:
      - type: 核心矛盾爆发
        content: 阻碍感情的最大障碍
      - type: 第三者身份真相
        content: 如果是虐恋，揭露第三者的真面目

    chapter_80_plus:
      - type: 最终反转
        content: 最后的大反转，颠覆之前认知
        examples: [男主一直默默守护, 所有考验都是为了她好]
      - type: HE实现
        content: 最终大团圆结局

  sub_genre_pacing:
    sweet:
      relationship_confirm: 5-15章
      identity_reveal: 20-40章
      core_conflict: 可能没有大的核心冲突
      characteristics: 悬念较少，主要是甜蜜互动

    angst:
      relationship_confirm: 可能反复确认
      max_misunderstanding: 50-70章解决
      chasing_arc: 60-80章
      characteristics: 悬念多，情感波折大

    rebirth:
      rebirth_reveal: 第1章就揭示
      enemy_truth: 20-40章
      fate_change: 60章+
      characteristics: 悬念主要在复仇和逆袭

    transmigration:
      transmigration_reveal: 第1章就揭示
      plot_change: 贯穿全书
      original_protagonist: 20-50章
      characteristics: 悬念在如何改变命运

  taboos:
    - content: 男主太晚出场（超过第5章）
      reason: 言情读者要看男女主互动，男主太晚会失去耐心
      severity: critical
    - content: 女主无底线原谅男主
      reason: 读者会不喜欢女主，觉得没有自尊
      severity: critical
    - content: 感情线被事业线/复仇线完全压制
      reason: 言情的核心是感情，其他是辅助
      severity: warning

  foreshadowing:
    principle: 每10章埋设1个新伏笔，每30章回收1个旧伏笔
    note: 言情悬念服务于情感，甜宠可更少，虐恋/重生可稍多
    sub_genre_adjustment:
      sweet: 每15章埋设1个，悬念较少
      angst: 每8章埋设1个，误会/真相悬念多
      rebirth: 每10章埋设1个，悬念在复仇
      transmigration: 每10章埋设1个，悬念在改变剧情
    examples:
      short_term_foreshadowing: 误会第1章埋设，5章内回收
      mid_term_foreshadowing: 第10章埋设，第40章回收
      long_term_foreshadowing: 第1章埋设，第80章+回收
    status_flow:
      - 潜伏 → 铺垫 → 可回收 → 已回收
